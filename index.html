<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON GLASS V27</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #030308;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --blur: blur(20px);
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            margin: 0; background: var(--bg); color: white;
            height: 100vh; display: flex; overflow: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a1a3a, transparent);
        }

        /* --- SMOOTH SCROLLBAR --- */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 320px; background: rgba(0,0,0,0.4); backdrop-filter: var(--blur);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            animation: slideInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideInLeft { from { transform: translateX(-100%); } }

        .sidebar-header {
            padding: 30px; font-weight: 600; letter-spacing: 2px;
            color: var(--accent); text-transform: uppercase; font-size: 0.8em;
        }

        .user-card {
            margin: 10px 15px; padding: 12px; border-radius: 18px;
            background: var(--glass); display: flex; align-items: center;
            border: 1px solid transparent; cursor: pointer;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .user-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--accent); transform: scale(1.02) translateX(5px);
        }

        .user-pp {
            width: 48px; height: 48px; border-radius: 16px;
            object-fit: cover; border: 2px solid var(--accent);
            margin-right: 15px;
        }

        /* --- MAIN CHAT --- */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }

        #messages {
            flex: 1; overflow-y: auto; padding: 40px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .msg-container {
            display: flex; gap: 15px; max-width: 80%;
            animation: msgPop 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes msgPop { from { opacity: 0; transform: translateY(20px); } }

        .bubble {
            background: var(--glass); padding: 15px 20px;
            border-radius: 4px 22px 22px 22px; border: 1px solid var(--border);
            line-height: 1.5; font-weight: 300;
        }

        .chat-img {
            max-width: 300px; border-radius: 15px; margin-top: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* --- INPUT AREA --- */
        #input-zone {
            padding: 30px; background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px); display: flex; gap: 15px;
        }

        .glass-input {
            flex: 1; background: var(--glass); border: 1px solid var(--border);
            padding: 15px 25px; border-radius: 20px; color: white;
            outline: none; transition: 0.3s;
        }

        .glass-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.06); }

        .btn-send {
            width: 55px; height: 55px; border-radius: 20px; border: none;
            background: var(--accent); color: black; font-weight: 600;
            cursor: pointer; transition: 0.3s;
        }

        .btn-send:hover { transform: rotate(10deg) scale(1.1); box-shadow: 0 0 20px var(--accent); }

        /* --- FENÊTRE D'APPEL FLOTTANTE (DISCORD STYLE) --- */
        #call-popup {
            display: none; position: fixed; top: 30px; right: 30px;
            width: 280px; background: rgba(15, 15, 25, 0.8);
            backdrop-filter: blur(30px); border-radius: 30px;
            border: 1px solid var(--accent); padding: 25px;
            z-index: 9999; flex-direction: column; align-items: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            animation: springIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes springIn { from { transform: scale(0.5) translateY(-100px); opacity: 0; } }

        .call-mini-pp {
            width: 80px; height: 80px; border-radius: 50%;
            border: 3px solid var(--accent); margin-bottom: 15px;
            animation: callGlow 2s infinite;
        }

        @keyframes callGlow { 0% { box-shadow: 0 0 0 0 rgba(0,242,255,0.4); } 100% { box-shadow: 0 0 0 20px rgba(0,242,255,0); } }

        .call-btns { display: flex; gap: 15px; margin-top: 20px; }
        .btn-call {
            width: 45px; height: 45px; border-radius: 50%; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* --- LOGIN --- */
        #login {
            position: fixed; inset: 0; background: var(--bg); z-index: 100000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            text-align: center; padding: 50px; background: var(--glass);
            border-radius: 40px; border: 1px solid var(--border);
            backdrop-filter: var(--blur);
        }
    </style>
</head>
<body>

    <div id="login">
        <div class="login-box">
            <h1 style="letter-spacing: 5px; color: var(--accent);">NEON GLASS</h1>
            <input id="nick" class="glass-input" placeholder="VOTRE NOM..." style="width: 250px; text-align: center;"><br><br>
            <input type="file" id="pp-up" style="display:none">
            <button onclick="document.getElementById('pp-up').click()" style="background:none; border:none; color:var(--accent); cursor:pointer;">[ PHOTO ]</button><br><br>
            <button class="btn-send" style="width:100%; border-radius:15px;" onclick="init()">ENTRER</button>
        </div>
    </div>

    <div id="call-popup">
        <img id="call-pp" class="call-mini-pp" src="">
        <b id="call-status">Appel entrant...</b>
        <div id="call-name" style="font-size: 0.8em; opacity: 0.6;">Utilisateur</div>
        <div class="call-btns">
            <button class="btn-call" style="background: #ff4757;" onclick="endCall()">✕</button>
            <button id="btn-accept" class="btn-call" style="background: #00ff88;">✔</button>
        </div>
        <audio id="remote-audio" autoplay></audio>
        <audio id="ringtone" loop src="https://assets.mixkit.co/sfx/preview/mixkit-phone-ringing-bell-590.mp3"></audio>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">Réseau Local</div>
        <div id="user-list"></div>
    </div>

    <div id="main">
        <div id="messages"></div>
        <form id="input-zone" onsubmit="event.preventDefault(); sendMsg();">
            <input type="file" id="img-up" accept="image/*" style="display:none">
            <button type="button" class="btn-send" style="background:none; border:1px solid var(--border); color:white" onclick="document.getElementById('img-up').click()">+</button>
            <input id="msg-in" class="glass-input" placeholder="Écrire un message..." autocomplete="off">
            <button type="submit" class="btn-send">➤</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myStream, pc, targetSid;
        let me = { name: "User", pp: "https://i.imgur.com/6VBx3io.png" };

        // --- INITIALISATION ---
        document.getElementById('pp-up').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => me.pp = ev.target.result;
            r.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('img-up').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => socket.emit('chat_msg', { img: ev.target.result, name: me.name, pp: me.pp });
            r.readAsDataURL(e.target.files[0]);
        };

        async function init() {
            const n = document.getElementById('nick').value;
            if(n) me.name = n;
            document.getElementById('login').style.display = 'none';
            myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            socket.emit('init_user', me);
        }

        // --- VOIP CORE (DISCORD FLOTTANT) ---
        const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        async function createCall(sid) {
            targetSid = sid;
            showPopup("Appel en cours...", "", "Appel sortant...");
            
            pc = new RTCPeerConnection(rtcConfig);
            myStream.getTracks().forEach(t => pc.addTrack(t, myStream));
            pc.onicecandidate = e => e.candidate && socket.emit('ice_candidate', { to: targetSid, candidate: e.candidate });
            pc.ontrack = e => document.getElementById('remote-audio').srcObject = e.streams[0];

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('call_request', { to: targetSid, signal: offer });
        }

        socket.on('incoming_call', async (d) => {
            targetSid = d.from;
            showPopup(d.pp, d.name, "Appel entrant...");
            document.getElementById('ringtone').play();
            document.getElementById('btn-accept').style.display = 'flex';
            
            document.getElementById('btn-accept').onclick = async () => {
                document.getElementById('ringtone').pause();
                document.getElementById('btn-accept').style.display = 'none';
                document.getElementById('call-status').innerText = "En ligne";
                
                pc = new RTCPeerConnection(rtcConfig);
                myStream.getTracks().forEach(t => pc.addTrack(t, myStream));
                pc.onicecandidate = e => e.candidate && socket.emit('ice_candidate', { to: targetSid, candidate: e.candidate });
                pc.ontrack = e => document.getElementById('remote-audio').srcObject = e.streams[0];

                await pc.setRemoteDescription(new RTCSessionDescription(d.signal));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('call_accept', { to: targetSid, signal: answer });
            };
        });

        socket.on('call_finalized', async (s) => {
            document.getElementById('call-status').innerText = "En ligne";
            await pc.setRemoteDescription(new RTCSessionDescription(s));
        });

        socket.on('ice_candidate', c => pc && pc.addIceCandidate(new RTCIceCandidate(c)));

        function showPopup(img, name, status) {
            document.getElementById('call-pp').src = img || "https://i.imgur.com/6VBx3io.png";
            document.getElementById('call-name').innerText = name;
            document.getElementById('call-status').innerText = status;
            document.getElementById('call-popup').style.display = 'flex';
        }

        function endCall() { location.reload(); }

        // --- UI & SYNC ---
        socket.on('update_users', (list) => {
            const container = document.getElementById('user-list');
            container.innerHTML = '';
            list.forEach(u => {
                if(u.sid === socket.id) return;
                const div = document.createElement('div');
                div.className = 'user-card';
                div.innerHTML = `
                    <img src="${u.pp}" class="user-pp">
                    <div style="flex:1">
                        <div style="font-weight:600; font-size:0.9em;">${u.name}</div>
                        <div style="font-size:0.7em; color:var(--accent); font-family:monospace;">${u.ip}</div>
                    </div>
                    <button class="btn-send" style="width:35px; height:35px; background:none; border:1px solid var(--border); color:var(--accent); font-size:12px;" onclick="createCall('${u.sid}')">📞</button>
                `;
                container.appendChild(div);
            });
        });

        function sendMsg() {
            const t = document.getElementById('msg-in').value;
            if(t) {
                socket.emit('chat_msg', { text: t, name: me.name, pp: me.pp });
                document.getElementById('msg-in').value = '';
            }
        }

        socket.on('chat_msg', d => {
            const div = document.createElement('div');
            div.className = 'msg-container';
            let html = `<img src="${d.pp}" class="user-pp" style="width:35px; height:35px;"><div><div style="font-size:0.7em; opacity:0.5; margin-bottom:5px;">${d.name}</div><div class="bubble">`;
            if(d.text) html += d.text;
            if(d.img) html += `<br><img src="${d.img}" class="chat-img">`;
            html += `</div></div>`;
            div.innerHTML = html;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    </script>
</body>
</html>
