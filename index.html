<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY NET - FILE SHARING</title>
    <style>
        :root { --user-color: #a29bfe; --neon: 0 0 15px #a29bfe; }
        body {
            margin: 0; padding: 0; background: #000 url('https://w0.peakpx.com/wallpaper/521/633/HD-wallpaper-incandescent-stars-sky-galaxy.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; height: 100vh; display: flex; overflow: hidden;
        }

        /* LOGIN */
        #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); transition: 0.5s; }
        .login-box { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; border: 1px solid var(--user-color); text-align: center; box-shadow: var(--neon); }
        
        /* INTERFACE */
        #side-menu { width: 280px; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        #main-chat { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 25px; list-style: none; scroll-behavior: smooth; }

        .msg-card {
            margin-bottom: 20px; padding: 15px; background: rgba(255, 255, 255, 0.08);
            border-radius: 20px; max-width: 80%; border-left: 5px solid var(--user-color);
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .user-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .mini-pp { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--user-color); object-fit: cover; }
        .name-tag { font-weight: bold; color: var(--user-color); text-shadow: var(--neon); }

        /* FORMULAIRE & BOUTONS */
        #form { display: flex; padding: 20px; background: rgba(0,0,0,0.9); gap: 10px; align-items: center; }
        input[type="text"] { background: rgba(255,255,255,0.07); border: 1px solid var(--user-color); color: white; padding: 12px 20px; border-radius: 30px; outline: none; flex: 1; }
        
        .btn { border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-file { background: rgba(255,255,255,0.1); font-size: 20px; width: 45px; height: 45px; padding: 0; border-radius: 50%; }
        .btn-file:hover { background: var(--user-color); }
        .btn-send { background: var(--user-color); box-shadow: var(--neon); }

        #call-window { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; }
        .chat-img { max-width: 100%; border-radius: 12px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:var(--user-color); text-shadow: var(--neon);">ACCÈS GALAXY</h2>
            <input type="text" id="login-name" placeholder="Ton Pseudo..." style="width:250px; margin-bottom:15px; border-radius: 10px; border: 1px solid #444; padding: 10px; background: #222; color: white;"><br>
            <input type="file" id="login-pp-file" accept="image/*" style="margin-bottom:15px; color: #888;"><br>
            <button class="btn btn-send" onclick="enterGalaxy()" style="width:250px;">REJOINDRE</button>
        </div>
    </div>

    <div id="side-menu">
        <div style="padding:30px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.1);">
            <img src="" id="my-avatar" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--user-color); box-shadow: var(--neon); object-fit: cover;">
            <h3 id="my-name-display" style="margin:10px 0;"></h3>
        </div>
        <ul id="friends-list" style="list-style:none; padding:10px;"></ul>
    </div>

    <div id="main-chat">
        <div id="call-window">
            <button onclick="endCall()" style="position:absolute; top:20px; right:20px; z-index:10001; background:red; color:white; border:none; padding:10px 20px; border-radius:30px; cursor:pointer;">FERMER</button>
            <iframe id="call-iframe" src="" style="width:100%; height:100%; border:none;" allow="camera; microphone;"></iframe>
        </div>

        <ul id="messages"></ul>
        
        <form id="form">
            <label class="btn btn-file">
                📎 <input type="file" id="msg-file" accept="image/*" style="display:none;" onchange="sendFile(this)">
            </label>
            <input id="input" autocomplete="off" placeholder="Écris un message..." />
            <button type="submit" class="btn btn-send">ENVOYER</button>
            <button type="button" class="btn" style="background:#eb4d4b;" onclick="startCall()">📞</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let userProfile = { name: "", pp: "" };

        // 1. LOGIN AVEC IMAGE FICHIER
        function enterGalaxy() {
            const name = document.getElementById('login-name').value;
            const ppFile = document.getElementById('login-pp-file').files[0];

            if(!name) return alert("Mets un pseudo !");

            if(ppFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    userProfile.pp = e.target.result;
                    finalizeLogin(name);
                };
                reader.readAsDataURL(ppFile);
            } else {
                userProfile.pp = "https://i.pinimg.com/originals/a9/d0/96/a9d096ac3abc607758ca2d14e3f287ac.gif";
                finalizeLogin(name);
            }
        }

        function finalizeLogin(name) {
            userProfile.name = name;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('my-avatar').src = userProfile.pp;
            document.getElementById('my-name-display').innerText = name;
        }

        // 2. ENVOI FICHIER DEPUIS LE CHAT
        function sendFile(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    socket.emit('chat message', {
                        text: e.target.result, // L'image en Base64
                        name: userProfile.name,
                        pp: userProfile.pp,
                        isFile: true
                    });
                };
                reader.readAsDataURL(file);
                input.value = ""; // Reset
            }
        }

        // 3. ENVOI TEXTE
        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('input');
            if(input.value) {
                socket.emit('chat message', {
                    text: input.value,
                    name: userProfile.name,
                    pp: userProfile.pp,
                    isFile: false
                });
                input.value = '';
            }
        };

        // 4. RÉCEPTION (FIX OBJECT OBJECT)
        socket.on('chat message', (data) => {
            const li = document.createElement('li');
            li.className = 'msg-card';
            
            li.innerHTML = `
                <div class="user-header">
                    <img src="${data.pp}" class="mini-pp">
                    <span class="name-tag">${data.name}</span>
                </div>
                <div>
                    ${data.isFile ? `<img src="${data.text}" class="chat-img">` : `<span>${data.text}</span>`}
                </div>
            `;
            document.getElementById('messages').appendChild(li);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        // APPEL
        function startCall() {
            const room = "Galaxy-" + Math.random().toString(36).substring(7);
            document.getElementById('call-iframe').src = `https://meet.jit.si/${room}`;
            document.getElementById('call-window').style.display = 'block';
        }
        function endCall() {
            document.getElementById('call-window').style.display = 'none';
            document.getElementById('call-iframe').src = '';
        }
    </script>
</body>
</html>
