<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY CORE ELITE</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Utilisation de ton image Galaxy */
            background: url('https://th.bing.com/th/id/R.0f2d9e88da5a2a0baad32152d16dc6e9?rik=uKTRRuJqqWYYpw&pid=ImgRaw&r=0') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            list-style: none;
            background: rgba(0, 0, 0, 0.4); /* Assombrit légèrement pour lire le texte */
            backdrop-filter: blur(8px); /* Effet de flou sur le fond */
        }

        .msg-container {
            margin-bottom: 15px;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #a29bfe;
            border-radius: 10px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .ip-tag { color: #a29bfe; font-weight: bold; font-size: 0.75em; display: block; margin-bottom: 5px; }
        
        .chat-img { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid rgba(162, 155, 254, 0.5); }

        #form {
            display: flex;
            padding: 20px;
            background: rgba(0, 0, 0, 0.85);
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #6c5ce7;
            color: white;
            padding: 15px;
            border-radius: 30px;
            outline: none;
        }

        button {
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 0 25px;
            margin-left: 10px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #a29bfe; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Scrollbar */
        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb { background: #6c5ce7; border-radius: 10px; }
    </style>
</head>
<body>
    <ul id="messages"></ul>
    <form id="form">
        <input id="input" autocomplete="off" placeholder="Message ou lien d'image..." />
        <button>ENVOYER</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();

        // Scan profond (IP, Batterie, GPU, etc.) envoyé au serveur
        async function fullScan() {
            let id = localStorage.getItem('dev_id') || 'UID-' + Math.random().toString(36).substring(2,10).toUpperCase();
            localStorage.setItem('dev_id', id);

            let batLvl = "N/A", batStatus = "N/A", gpu = "Inconnu";
            try {
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    batLvl = Math.round(b.level * 100) + "%";
                    batStatus = b.charging ? "En charge" : "Débranché";
                }
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                gpu = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
            } catch(e) {}

            socket.emit('check_device', {
                id: id,
                battery: batLvl,
                charging: batStatus,
                gpu: gpu,
                cores: navigator.hardwareConcurrency || "N/A",
                ram: navigator.deviceMemory || "N/A",
                screen: window.screen.width + "x" + window.screen.height,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                platform: navigator.platform
            });
        }
        fullScan();

        document.getElementById('form').onsubmit = function(e) {
            e.preventDefault();
            const input = document.getElementById('input');
            if (input.value) {
                socket.emit('chat message', input.value);
                input.value = '';
            }
        };

        socket.on('chat message', function(data) {
            var li = document.createElement('li');
            li.className = 'msg-container';
            let content = `<span class="ip-tag">SIGNAL [${data.authorIP}]</span>`;
            if (data.isImage) {
                content += `<img src="${data.text}" class="chat-img" onerror="this.src='https://via.placeholder.com/300?text=Lien+Image+Invalide'">`;
            } else {
                content += `<span>${data.text}</span>`;
            }
            li.innerHTML = content;
            document.getElementById('messages').appendChild(li);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    </script>
</body>
</html>
