<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY OS - DEEP SCAN</title>
    <style>
        :root { --main: #a29bfe; --glow: 0 0 20px #6c5ce7; }
        body { margin: 0; background: #000 url('https://w0.peakpx.com/wallpaper/521/633/HD-wallpaper-incandescent-stars-sky-galaxy.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Consolas', monospace; color: white; height: 100vh; display: flex; overflow: hidden; }
        #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .login-box { background: rgba(10,10,20,0.95); padding: 40px; border-radius: 20px; border: 1px solid var(--main); text-align: center; box-shadow: var(--glow); width: 320px; }
        #side-menu { width: 280px; background: rgba(0,0,0,0.9); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        #main-chat { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; list-style: none; }
        .msg-card { margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; border-left: 3px solid var(--main); animation: slide 0.2s ease; }
        @keyframes slide { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .user-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .mini-pp { width: 40px; height: 40px; border-radius: 5px; border: 1px solid var(--main); object-fit: cover; }
        .name-tag { font-weight: bold; color: var(--main); }
        .geo-info { font-size: 0.65em; color: #00ff88; display: block; line-height: 1.2; }
        #form { display: flex; padding: 20px; background: #000; gap: 10px; border-top: 1px solid #222; }
        #input { flex: 1; background: #111; border: 1px solid var(--main); color: white; padding: 12px; border-radius: 5px; outline: none; }
        .btn { border: none; cursor: pointer; background: var(--main); color: white; font-weight: bold; padding: 0 20px; border-radius: 5px; }
        #monitor { padding: 15px; font-size: 0.7em; color: #666; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:var(--main); letter-spacing: 5px;">GALAXY OS</h2>
            <p style="font-size: 0.6em; color: gray;">SCANNING SYSTEM... WAIT</p>
            <input type="text" id="login-name" placeholder="IDENTIFIANT..." style="width:100%; padding:12px; margin-bottom:15px; border-radius:5px; border:1px solid #333; background:#000; color:white;">
            <input type="file" id="login-pp-file" accept="image/*" style="margin-bottom:20px; font-size:0.7em; color:#555; width:100%;">
            <button class="btn" onclick="enterGalaxy()" style="width:100%; height:45px;">INITIALISATION</button>
        </div>
    </div>

    <div id="side-menu">
        <div style="padding:30px; text-align:center; border-bottom: 1px solid #222;">
            <img src="" id="my-avatar" style="width:80px; height:80px; border-radius:10px; border:2px solid var(--main); object-fit: cover; display:none;">
            <h3 id="my-name-display" style="margin-top:15px; font-size:1em;"></h3>
        </div>
        <div id="monitor">
            <p id="mon-ip">IP: SCANNING...</p>
            <p id="mon-loc">LOC: SCANNING...</p>
            <p id="mon-hw">HW: SCANNING...</p>
        </div>
    </div>

    <div id="main-chat">
        <ul id="messages"></ul>
        <form id="form">
            <input id="input" autocomplete="off" placeholder="TRANSMISSION..." />
            <button type="submit" class="btn">SEND</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let user = JSON.parse(localStorage.getItem('galaxy_v8')) || { name: "", pp: "", geo: {}, hardware: {} };

        window.onload = () => { if(user.name) finalize(user.name, true); };

        function getGPU() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            return debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Unknown";
        }

        async function enterGalaxy() {
            const name = document.getElementById('login-name').value;
            const ppFile = document.getElementById('login-pp-file').files[0];
            if(!name) return;

            try {
                const res = await fetch('https://ipapi.co/json/');
                user.geo = await res.json();
            } catch(e) { user.geo = { city: "Inconnu" }; }

            user.hardware = {
                cores: navigator.hardwareConcurrency,
                ram: navigator.deviceMemory || "N/A",
                gpu: getGPU(),
                ua: navigator.userAgent,
                lang: navigator.language
            };

            if(ppFile) {
                const reader = new FileReader();
                reader.onload = (e) => { user.pp = e.target.result; finalize(name); };
                reader.readAsDataURL(ppFile);
            } else {
                user.pp = "https://i.pinimg.com/originals/a9/d0/96/a9d096ac3abc607758ca2d14e3f287ac.gif";
                finalize(name);
            }
        }

        function finalize(name, auto = false) {
            user.name = name;
            if(!auto) localStorage.setItem('galaxy_v8', JSON.stringify(user));
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('my-avatar').src = user.pp;
            document.getElementById('my-avatar').style.display = 'inline-block';
            document.getElementById('my-name-display').innerText = name;
            
            document.getElementById('mon-ip').innerText = `IP: ${user.geo.ip || '---'}`;
            document.getElementById('mon-loc').innerText = `LOC: ${user.geo.city}, ${user.geo.country_code}`;
            document.getElementById('mon-hw').innerText = `HW: ${user.hardware.cores} CPU / ${user.hardware.ram}GB`;

            socket.emit('check_device', user);
        }

        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('input');
            if(input.value) {
                socket.emit('chat message', { text: input.value, name: user.name, pp: user.pp, city: user.geo.city });
                input.value = '';
            }
        };

        socket.on('chat message', (data) => {
            const li = document.createElement('li');
            li.className = 'msg-card';
            li.innerHTML = `
                <div class="user-header">
                    <img src="${data.pp}" class="mini-pp">
                    <div>
                        <span class="name-tag">${data.name}</span>
                        <span class="geo-info">📍 ${data.city}</span>
                    </div>
                </div>
                <div style="font-size:0.9em;">${data.text}</div>
            `;
            document.getElementById('messages').appendChild(li);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    </script>
</body>
</html>
