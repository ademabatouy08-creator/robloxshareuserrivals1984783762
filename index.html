<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PHANTOM_NETWORK // V23</title>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; --accent: #ff00ff; }
        body { background: var(--bg); color: var(--neon); font-family: 'Consolas', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* LOGIN OVERLAY */
        #auth { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .login-card { border: 1px solid var(--neon); padding: 40px; background: #000; box-shadow: 0 0 20px rgba(0,255,65,0.2); text-align: center; }
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; margin: 10px 0; width: 250px; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 12px 30px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }

        /* MAIN INTERFACE */
        #sidebar { width: 300px; border-right: 1px solid #222; background: #050505; display: flex; flex-direction: column; }
        .header { padding: 20px; font-size: 1.2rem; border-bottom: 1px solid #222; text-shadow: 0 0 5px var(--neon); }
        #user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-box { padding: 15px; border: 1px solid #111; margin-bottom: 10px; transition: 0.3s; cursor: pointer; position: relative; }
        .user-box:hover { border-color: var(--neon); background: rgba(0,255,65,0.05); }
        .ip-label { color: #ffff00; font-size: 0.8rem; display: block; margin-top: 5px; font-weight: bold; }

        #chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; background-image: linear-gradient(rgba(0,255,65,0.03) 1px, transparent 1px); background-size: 100% 3px; }
        .msg { margin-bottom: 10px; line-height: 1.4; border-left: 2px solid #222; padding-left: 10px; }
        .system-alert { color: var(--accent); background: rgba(255,0,255,0.1); padding: 10px; border: 1px solid var(--accent); margin: 10px 0; animation: blink 1s infinite; }
        
        @keyframes blink { 50% { opacity: 0.7; } }
        
        #input-zone { padding: 20px; background: #000; border-top: 1px solid #222; }
        #msg-in { width: 100%; box-sizing: border-box; font-size: 1rem; }
    </style>
</head>
<body>

<div id="auth">
    <div class="login-card">
        <h1 style="margin-top:0">INITIALIZING...</h1>
        <input type="text" id="nick" placeholder="GHOST_NAME">
        <input type="email" id="mail" placeholder="ACCESS_KEY (Email)">
        <br><button onclick="connect()">EXECUTE</button>
    </div>
</div>

<div id="sidebar">
    <div class="header"> [ DECRYPTED_USERS ] </div>
    <div id="user-list"></div>
</div>

<div id="chat-area">
    <div id="messages"></div>
    <div id="input-zone">
        <input type="text" id="msg-in" placeholder="TYPE_MESSAGE_HERE..." onkeydown="if(event.key==='Enter')send()">
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myMail = "";

    function connect() {
        const n = document.getElementById('nick').value;
        myMail = document.getElementById('mail').value;
        if(n && myMail) {
            document.getElementById('auth').style.display = 'none';
            socket.emit('init', { n: n, e: myMail });
        }
    }

    function send() {
        const inp = document.getElementById('msg-in');
        if(inp.value) {
            socket.emit('chat', { t: inp.value });
            inp.value = "";
        }
    }

    socket.on('notification', d => {
        const msgDiv = document.getElementById('messages');
        const alert = document.createElement('div');
        alert.className = 'system-alert';
        alert.innerHTML = `>> [SYSTEM_CRITICAL]: ${d.msg} <<`;
        msgDiv.prepend(alert);
        // Optionnel : un petit son de bip si tu veux (nécessite un fichier audio)
    });

    socket.on('chat', d => {
        const msgDiv = document.getElementById('messages');
        const b = document.createElement('div');
        b.className = 'msg';
        b.innerHTML = `<span style="color:${d.color}">[${d.n}]</span>: ${d.t}`;
        msgDiv.appendChild(b);
        msgDiv.scrollTop = msgDiv.scrollHeight;
    });

    socket.on('sync', users => {
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        users.forEach(u => {
            const card = document.createElement('div');
            card.className = 'user-box';
            // L'IP n'apparaît que si elle est envoyée par le serveur (pour le Maître)
            let ipTag = u.ip ? `<span class="ip-label">ADDRESS: ${u.ip}</span>` : "";
            card.innerHTML = `<b>> ${u.n}</b>${ipTag}`;
            
            card.onclick = () => {
                if(u.ip) {
                    navigator.clipboard.writeText(u.ip);
                    alert("TARGET_IP_COPIED: " + u.ip);
                }
            };
            list.appendChild(card);
        });
    });
</script>
</body>
</html>
