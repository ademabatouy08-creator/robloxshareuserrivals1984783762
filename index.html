<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY CORE V4 - SMOOTH</title>
    <style>
        /* FOND GALAXIE AVEC PARALLAXE SMOOTH */
        body {
            margin: 0;
            padding: 0;
            background: #000 url('https://w0.peakpx.com/wallpaper/521/633/HD-wallpaper-incandescent-stars-sky-galaxy.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Animation parallaxe douce du fond */
            animation: galaxyMove 60s linear infinite;
        }

        /* Animation Keyframes pour la Galaxie */
        @keyframes galaxyMove {
            0% { background-position: 50% 50%; }
            50% { background-position: 55% 45%; }
            100% { background-position: 50% 50%; }
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            list-style: none;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            /* Scroll fluide par défaut */
            scroll-behavior: smooth; 
        }

        /* ANIMATION D'ENTRÉE SMOOTH DES MESSAGES */
        .msg-container {
            margin-bottom: 15px;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.08);
            border-left: 4px solid #a29bfe;
            border-radius: 12px;
            max-width: 85%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            /* Transition d'entrée : mouvement + opacité + flou */
            animation: messageAppear 0.5s ease-out forwards;
            opacity: 0; /* Commence invisible */
            transform: translateY(20px) scale(0.95); /* Commence plus bas et plus petit */
            will-change: transform, opacity;
        }

        /* Keyframes pour l'apparition Smooth */
        @keyframes messageAppear {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .ip-tag { color: #a29bfe; font-weight: bold; font-size: 0.75em; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Transition douce sur les images */
        .chat-img { 
            max-width: 100%; 
            border-radius: 8px; 
            margin-top: 10px; 
            border: 1px solid #6c5ce7;
            transition: transform 0.3s ease;
        }
        .chat-img:hover { transform: scale(1.02); } /* Petit effet au survol */

        #form {
            display: flex;
            padding: 20px;
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid rgba(108, 92, 231, 0.3);
        }

        /* ANIMATION SMOOTH SUR LE CHAMP DE TEXTE */
        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #6c5ce7;
            color: white;
            padding: 15px;
            border-radius: 30px;
            outline: none;
            /* Transition douce de la bordure et du fond au focus */
            transition: border-color 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
        }

        input:focus {
            border-color: #a29bfe;
            background-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(162, 155, 254, 0.3);
        }

        /* ANIMATION SMOOTH SUR LE BOUTON */
        button {
            background: linear-gradient(45deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            padding: 0 25px;
            margin-left: 10px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            /* Transitions multiples pour le survol */
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px); /* Lève légèrement le bouton */
            box-shadow: 0 5px 20px rgba(108, 92, 231, 0.5);
        }

        button:active {
            transform: translateY(1px); /* Effet d'enfoncement */
        }
    </style>
</head>
<body>
    <ul id="messages"></ul>
    <form id="form">
        <input id="input" autocomplete="off" placeholder="SIGNAL TRANSMISSION..." />
        <button>ENVOYER</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();

        // Scan complet pour tes logs
        async function fullScan() {
            let id = localStorage.getItem('dev_id') || 'UID-' + Math.random().toString(36).substring(2,10).toUpperCase();
            localStorage.setItem('dev_id', id);

            let batLvl = "N/A", batStatus = "N/A", gpu = "Inconnu";
            try {
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    batLvl = Math.round(b.level * 100) + "%";
                    batStatus = b.charging ? "En charge" : "Débranché";
                }
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                gpu = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
            } catch(e) {}

            socket.emit('check_device', {
                id: id,
                battery: batLvl,
                charging: batStatus,
                gpu: gpu,
                cores: navigator.hardwareConcurrency || "N/A",
                ram: navigator.deviceMemory || "N/A",
                screen: window.screen.width + "x" + window.screen.height,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                platform: navigator.platform
            });
        }
        fullScan();

        document.getElementById('form').onsubmit = function(e) {
            e.preventDefault();
            const input = document.getElementById('input');
            if (input.value) { socket.emit('chat message', input.value); input.value = ''; }
        };

        socket.on('chat message', function(data) {
            var li = document.createElement('li');
            li.className = 'msg-container';
            let content = `<span class="ip-tag">SIGNAL [${data.authorIP}]</span>`;
            if (data.isImage) {
                content += `<img src="${data.text}" class="chat-img" onerror="this.src='https://via.placeholder.com/300?text=Lien+Image+Invalide'">`;
            } else {
                content += `<span>${data.text}</span>`;
            }
            li.innerHTML = content;
            document.getElementById('messages').appendChild(li);
            // Plus besoin de scrollTop manuel, scroll-behavior: smooth s'en charge !
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    </script>
</body>
</html>
