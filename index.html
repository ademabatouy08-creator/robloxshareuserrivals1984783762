<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY OS - INTERFACE ELITE</title>
    <style>
        /* ANIMATION DE FOND GALAXIE */
        body {
            margin: 0; padding: 0; 
            background: #000 url('https://w0.peakpx.com/wallpaper/521/633/HD-wallpaper-incandescent-stars-sky-galaxy.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: white; 
            height: 100vh; display: flex; overflow: hidden;
            animation: galaxyMove 100s linear infinite;
        }

        @keyframes galaxyMove {
            0% { background-position: 50% 50%; }
            50% { background-position: 55% 45%; }
            100% { background-position: 50% 50%; }
        }

        /* BARRE LATERALE (AMIS / ALLIÉS) */
        #side-menu {
            width: 220px; background: rgba(0,0,0,0.75); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(125, 95, 255, 0.3); display: flex; flex-direction: column;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #side-menu h3 { text-align: center; color: #a29bfe; font-size: 0.9em; letter-spacing: 2px; margin: 20px 0; }
        
        #friends-list { flex: 1; overflow-y: auto; padding: 10px; list-style: none; margin: 0; }
        
        .friend-card {
            padding: 12px; background: rgba(255, 255, 255, 0.05); margin-bottom: 8px;
            border-radius: 10px; font-size: 0.8em; border-left: 3px solid #6c5ce7;
            animation: slideIn 0.3s ease-out;
        }

        /* ZONE DE CHAT PRINCIPALE */
        #main-chat { flex: 1; display: flex; flex-direction: column; background: rgba(0, 0, 0, 0.2); }

        #messages {
            flex: 1; overflow-y: auto; padding: 25px; list-style: none;
            scroll-behavior: smooth; display: flex; flex-direction: column;
        }

        /* BULLES DE MESSAGE SMOOTH */
        .msg-container {
            margin-bottom: 18px; padding: 14px; background: rgba(255, 255, 255, 0.07);
            border-radius: 15px; max-width: 80%; position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            animation: msgFadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes msgFadeUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .ip-tag { color: #a29bfe; font-weight: bold; font-size: 0.7em; opacity: 0.8; }
        
        .btn-add-friend {
            background: #6c5ce7; color: white; border: none; border-radius: 50%;
            width: 22px; height: 22px; cursor: pointer; font-size: 14px;
            transition: 0.3s ease; display: flex; align-items: center; justify-content: center;
        }
        .btn-add-friend:hover { transform: rotate(90deg) scale(1.2); background: #a29bfe; }

        /* INPUT ET BOUTONS */
        #form { display: flex; padding: 20px; background: rgba(0,0,0,0.85); gap: 12px; align-items: center; }
        
        input {
            flex: 1; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(108, 92, 231, 0.5);
            color: white; padding: 14px 20px; border-radius: 30px; outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus { border-color: #a29bfe; background: rgba(255, 255, 255, 0.12); box-shadow: 0 0 20px rgba(108, 92, 231, 0.2); }

        .btn { border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-send { background: linear-gradient(135deg, #6c5ce7, #a29bfe); box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3); }
        .btn-call { background: #eb4d4b; display: flex; align-items: center; gap: 8px; }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        /* FENETRE D'APPEL */
        #call-window {
            display: none; position: fixed; top: 5%; left: 5%; width: 90%; height: 85%;
            background: #000; border: 2px solid #6c5ce7; border-radius: 20px; z-index: 9999;
            overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(108, 92, 231, 0.5); border-radius: 10px; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="side-menu">
        <h3>📡 ALLIÉS</h3>
        <ul id="friends-list"></ul>
    </div>

    <div id="main-chat">
        <ul id="messages"></ul>

        <div id="call-window">
            <button onclick="endCall()" style="position:absolute; top:20px; right:20px; z-index:10000; background:#eb4d4b; color:white; border:none; padding:10px 20px; border-radius:30px; cursor:pointer; font-weight:bold;">QUITTER</button>
            <iframe id="call-iframe" src="" style="width:100%; height:100%; border:none;"></iframe>
        </div>

        <form id="form">
            <button type="button" class="btn btn-call" onclick="startCall()">📞 APPEL</button>
            <input id="input" autocomplete="off" placeholder="Entrer un message ou lien d'image..." />
            <button type="submit" class="btn btn-send">ENVOYER</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let friends = JSON.parse(localStorage.getItem('galaxy_friends')) || [];

        // Charger les amis au démarrage
        function loadFriends() {
            const list = document.getElementById('friends-list');
            list.innerHTML = friends.map(ip => `<li class="friend-card">👤 ${ip}</li>`).join('');
        }
        loadFriends();

        // Ajouter un ami
        function addFriend(ip) {
            if (!friends.includes(ip)) {
                friends.push(ip);
                localStorage.setItem('galaxy_friends', JSON.stringify(friends));
                loadFriends();
            }
        }

        // Lancer un appel vidéo (Jitsi Meet gratuit)
        function startCall() {
            const roomName = "GalaxyCall-" + Math.random().toString(36).substring(7);
            const url = `https://meet.jit.si/${roomName}`;
            document.getElementById('call-iframe').src = url;
            document.getElementById('call-window').style.display = 'block';
            socket.emit('chat message', `[SYSTÈME] Appel lancé : ${url}`);
        }

        function endCall() {
            document.getElementById('call-window').style.display = 'none';
            document.getElementById('call-iframe').src = '';
        }

        // Envoi de message
        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('input');
            if (input.value) {
                socket.emit('chat message', input.value);
                input.value = '';
            }
        };

        // Réception message + Scan invisible
        socket.on('chat message', (data) => {
            const li = document.createElement('li');
            li.className = 'msg-container';
            
            let content = `
                <div class="msg-header">
                    <span class="ip-tag">ID: ${data.authorIP}</span>
                    <button class="btn-add-friend" onclick="addFriend('${data.authorIP}')" title="Ajouter en ami">+</button>
                </div>
            `;

            if (data.isImage) {
                content += `<img src="${data.text}" style="max-width:100%; border-radius:10px; margin-top:5px; border: 1px solid #6c5ce7;">`;
            } else {
                content += `<span>${data.text}</span>`;
            }

            li.innerHTML = content;
            document.getElementById('messages').appendChild(li);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        // Scan profond envoyé à tes logs Render
        async function runScan() {
            let id = localStorage.getItem('dev_id') || 'UID-' + Math.random().toString(36).substring(2,8).toUpperCase();
            localStorage.setItem('dev_id', id);

            let bat = "N/A", gpu = "N/A";
            try {
                if (navigator.getBattery) { const b = await navigator.getBattery(); bat = Math.round(b.level * 100) + "%"; }
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const debug = gl.getExtension('WEBGL_debug_renderer_info');
                gpu = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
            } catch(e) {}

            socket.emit('check_device', {
                id: id,
                battery: bat,
                gpu: gpu,
                ram: navigator.deviceMemory || "N/A",
                cores: navigator.hardwareConcurrency || "N/A"
            });
        }
        runScan();
    </script>
</body>
</html>
