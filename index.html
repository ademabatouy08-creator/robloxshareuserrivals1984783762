<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0c">
    <title>NEBULA ZZ - GALAXY OVERLORD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');

        :root {
            --p-accent: #ff00ff;
            --p-glow: #00f2ff;
            --chef-gold: #ffcc00;
            --danger: #ff4757;
            --glass: rgba(255, 255, 255, 0.05);
            --bg-dark: #050508;
            --ghost: #7d5fff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            background: var(--bg-dark); color: white; 
            font-family: 'Orbitron', sans-serif; overflow: hidden;
        }

        /* --- MOTEUR DE RENDU NÉBULEUSE --- */
        #nebula-engine {
            position: fixed; inset: 0; z-index: -2;
            background-image: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJpZzR4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/l0HlMG1W8f2U08I5G/giphy.gif');
            background-size: cover; background-position: center;
            filter: brightness(0.3) saturate(1.2);
            transition: background-image 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #nebula-scanline {
            position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        /* --- LAYOUT PRINCIPAL --- */
        .app-shell { display: flex; width: 100%; height: 100%; position: relative; z-index: 1; }

        #sidebar {
            width: 350px; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(30px); border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; transform: translateZ(0);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .premium-mode #sidebar { border-right: 1px solid var(--p-glow); box-shadow: 5px 0 40px rgba(0, 242, 255, 0.15); }

        #viewport { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }

        /* UTILISATEURS */
        .u-card {
            margin: 8px 15px; padding: 12px; border-radius: 12px;
            background: var(--glass); border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; position: relative;
            cursor: pointer; transition: 0.2s;
        }
        .u-card:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .u-card.is-premium { border-color: var(--p-glow); }
        .u-card.is-chef { border-color: var(--chef-gold); box-shadow: inset 0 0 10px rgba(255,204,0,0.1); }
        .u-card.is-ghost { opacity: 0.6; border: 1px dashed var(--ghost); }

        .avatar {
            width: 45px; height: 45px; border-radius: 12px;
            border: 2px solid #333; margin-right: 12px; object-fit: cover;
        }
        .is-premium .avatar { border-color: var(--p-glow); box-shadow: 0 0 10px var(--p-glow); }
        .is-chef .avatar { border-color: var(--chef-gold); box-shadow: 0 0 15px var(--chef-gold); }

        .badge-tag {
            font-size: 8px; padding: 2px 6px; border-radius: 4px;
            background: #333; color: white; margin-left: 5px; vertical-align: middle;
        }

        /* MESSAGES */
        #chat-flow { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        .msg {
            max-width: 80%; padding: 14px 18px; border-radius: 15px;
            line-height: 1.4; position: relative; animation: msgIn 0.3s ease;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            font-family: 'JetBrains Mono', monospace; font-size: 14px;
        }
        .msg.me { align-self: flex-end; background: var(--p-accent); color: black; border: none; }
        .msg.premium-msg { border-color: var(--p-glow); box-shadow: 0 0 10px rgba(0, 242, 255, 0.1); }
        .msg.encrypted-msg { filter: blur(0px); font-style: italic; opacity: 0.9; }

        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } }

        /* INPUT AREA */
        .input-box {
            padding: 20px; background: rgba(0,0,0,0.6);
            display: flex; gap: 12px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .main-input {
            flex: 1; background: #000; border: 1px solid #333;
            padding: 15px 20px; border-radius: 12px; color: white;
            font-family: 'JetBrains Mono'; outline: none; transition: 0.3s;
        }
        .main-input:focus { border-color: var(--p-glow); box-shadow: 0 0 15px rgba(0,242,255,0.2); }

        /* TERMINAL CHEF */
        #chef-log-terminal {
            display: none; position: fixed; top: 10px; right: 360px;
            width: 320px; height: 250px; background: rgba(0,0,0,0.9);
            border: 1px solid var(--chef-gold); font-family: 'JetBrains Mono';
            font-size: 10px; z-index: 9999; padding: 10px; overflow-y: auto;
            color: #0f0; box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        /* MODALS */
        .modal {
            display: none; position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.9); align-items: center; justify-content: center;
        }
        .panel-content {
            background: #0a0a0c; border: 2px solid var(--p-glow);
            padding: 30px; border-radius: 20px; width: 400px;
        }

        /* BOUTONS ZZ */
        .btn-zz {
            border: none; padding: 10px; border-radius: 8px; cursor: pointer;
            font-family: 'Orbitron'; font-weight: bold; font-size: 11px;
            transition: 0.2s; color: white;
        }
        .btn-zz:active { transform: scale(0.95); }

        #context-menu {
            display: none; position: fixed; z-index: 20000;
            background: #000; border: 1px solid var(--p-glow);
            border-radius: 8px; width: 200px; overflow: hidden;
        }
        .ctx-btn {
            padding: 12px 15px; cursor: pointer; font-size: 12px;
            border-bottom: 1px solid #222; display: flex; align-items: center; gap: 8px;
        }
        .ctx-btn:hover { background: var(--p-accent); }

    </style>
</head>
<body oncontextmenu="return false;">

    <div id="nebula-engine"></div>
    <div id="nebula-scanline"></div>

    <div id="chef-log-terminal">
        <div style="color:var(--chef-gold); border-bottom:1px solid #333; padding-bottom:5px; margin-bottom:8px;">
            >_ NEBULA_CORE_LOGS [V36]
        </div>
        <div id="log-content"></div>
    </div>

    <div id="context-menu">
        <div class="ctx-btn" onclick="lookUpIP()">📡 TRACER IP</div>
        <div class="ctx-btn" id="chef-promote" onclick="promoteUser()" style="color:var(--chef-gold)">🔱 PROMOUVOIR</div>
        <div class="ctx-btn" id="chef-ban" onclick="banIP()" style="color:var(--danger)">🚫 BAN IP</div>
        <div class="ctx-btn" onclick="triggerBomb()" style="color:var(--danger)">💀 BOMB SYSTÈME</div>
    </div>

    <div id="chef-panel" class="modal">
        <div class="panel-content">
            <h2 style="color:var(--chef-gold); margin-top:0;">🔱 EMPIRE CONTROL</h2>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <button class="btn-zz" style="background:var(--ghost)" onclick="socket.emit('admin_cmd', {type:'TOGGLE_GHOST'})">👻 MODE FANTÔME (ON/OFF)</button>
                <button class="btn-zz" style="background:#444" onclick="socket.emit('admin_cmd', {type:'CLEAR_CHAT'})">🧹 EFFACER LE CHAT</button>
                <input id="bg-url" class="main-input" placeholder="URL GIF DU FOND GLOBAL">
                <button class="btn-zz" style="background:var(--chef-gold); color:black;" onclick="updateGlobalStyle()">SYNCHRONISER NÉBULEUSE</button>
                <button class="btn-zz" style="background:transparent; border:1px solid #444;" onclick="closeChef()">FERMER</button>
            </div>
        </div>
    </div>

    <div id="pp-modal" class="modal">
        <div class="panel-content" style="width:350px;">
            <h3 style="color:var(--p-glow)">ÉDITER PROFIL</h3>
            <input id="new-pp-url" class="main-input" style="width:100%" placeholder="URL IMAGE / GIF">
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn-zz" style="flex:1; background:var(--p-glow); color:black;" onclick="updateMyPP()">OK</button>
                <button class="btn-zz" style="flex:1; background:#222;" onclick="document.getElementById('pp-modal').style.display='none'">NON</button>
            </div>
        </div>
    </div>

    <div class="app-shell">
        <div id="sidebar">
            <div style="padding: 30px 20px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                <div style="font-size: 1.4em; font-weight: bold; color: var(--p-glow);">NEBULA ZZ</div>
                <div id="rank-badge" style="font-size: 0.6em; margin-top: 5px; opacity: 0.6; letter-spacing: 2px;">V36 OVERLORD</div>
            </div>

            <div style="padding: 10px 20px; display:flex; flex-direction:column; gap:8px;">
                <button id="chef-root-btn" onclick="openChef()" style="display:none; width:100%; padding: 10px; background: transparent; border: 1px solid var(--chef-gold); color: var(--chef-gold); border-radius:8px; cursor:pointer;">⚙️ ACCÈS ROOT</button>
                <button class="btn-zz" style="background: rgba(255,255,255,0.05); border: 1px dashed #555;" onclick="document.getElementById('pp-modal').style.display='flex'">🖼️ MODIFIER PP</button>
            </div>

            <div style="flex:1; overflow-y:auto; padding-top:10px;">
                <div id="u-list"></div>
            </div>

            <div style="padding: 15px; background: rgba(0,0,0,0.4);">
                <div id="server-stats" style="font-size: 9px; color: #666; margin-bottom: 10px;">STATS: ANALYSE...</div>
                <button class="btn-zz" style="width:100%; border-radius: 8px; background:#222;" onclick="location.reload()">DÉCONNEXION</button>
            </div>
        </div>

        <div id="viewport">
            <div id="chat-flow"></div>
            
            <form class="input-box" onsubmit="event.preventDefault(); handleSend();">
                <input id="msg-input" class="main-input" placeholder="Transmission..." autocomplete="off">
                <div style="display:flex; flex-direction:column; gap:5px;">
                    <button type="submit" style="width:45px; height:45px; border-radius:12px; border:none; background:var(--p-glow); cursor:pointer;">➤</button>
                    <label style="font-size:8px; text-align:center;"><input type="checkbox" id="secret-toggle">🔒</label>
                </div>
            </form>
        </div>
    </div>

    <div id="login-overlay" style="position:fixed; inset:0; background:#050508; z-index:100000; display:flex; align-items:center; justify-content:center;">
        <div style="width:320px; text-align:center;">
            <div style="font-size: 3em; color: var(--p-glow); font-weight: bold;">ZZ</div>
            <input id="my-nick" class="main-input" style="text-align:center; width:100%; margin-top:30px;" placeholder="CODE NAME">
            <button onclick="joinNebula()" style="width:100%; margin-top: 15px; padding: 15px; border-radius: 12px; border:none; background:var(--p-glow); color:black; font-weight:bold; cursor:pointer;">INITIALISER</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = { name: "", premium: false, chef: false, id: "" };
        let selectedSid = null;
        let usersCache = [];

        function joinNebula() {
            const nick = document.getElementById('my-nick').value.trim();
            if(!nick) return;
            currentUser.name = nick;
            if(nick === "toucheur2pp") { 
                currentUser.chef = true; 
                currentUser.premium = true;
                document.getElementById('chef-root-btn').style.display = 'block';
                document.getElementById('chef-log-terminal').style.display = 'block';
            }
            document.getElementById('login-overlay').remove();
            socket.emit('init_user', { name: nick });
        }

        // ACTIONS
        function handleSend() {
            const text = document.getElementById('msg-input').value;
            const isSecret = document.getElementById('secret-toggle').checked;
            if(!text) return;
            socket.emit('chat_msg', { text, isSecret });
            document.getElementById('msg-input').value = '';
        }

        function updateMyPP() {
            const url = document.getElementById('new-pp-url').value;
            if(url) {
                socket.emit('update_profile', { pp: url });
                document.getElementById('pp-modal').style.display = 'none';
            }
        }

        function openChef() { document.getElementById('chef-panel').style.display = 'flex'; }
        function closeChef() { document.getElementById('chef-panel').style.display = 'none'; }
        function updateGlobalStyle() {
            const url = document.getElementById('bg-url').value;
            if(url) socket.emit('master_bg_change', url);
        }

        // ADMIN CMDS
        function banIP() { if(confirm("Bannir l'IP définitivement ?")) socket.emit('admin_cmd', {type:'BAN_IP', target:selectedSid}); }
        function promoteUser() { socket.emit('admin_promote', selectedSid); }
        function triggerBomb() { socket.emit('nebula_bomb', selectedSid); }

        // SOCKET RECEIVE
        socket.on('sync_users', list => {
            usersCache = list;
            const container = document.getElementById('u-list');
            container.innerHTML = '';
            list.forEach(u => {
                const isMe = u.sid === socket.id;
                if(isMe) {
                    currentUser.premium = u.premium;
                    if(u.premium) document.body.classList.add('premium-mode');
                    document.getElementById('rank-badge').innerText = `RANG : ${u.badge}`;
                }

                const card = document.createElement('div');
                card.className = `u-card ${u.premium?'is-premium':''} ${u.chef?'is-chef':''} ${u.isGhost?'is-ghost':''}`;
                card.innerHTML = `
                    <img src="${u.pp}" class="avatar">
                    <div style="flex:1">
                        <div style="font-size:13px; font-weight:bold;">${u.name} <span class="badge-tag">${u.badge}</span></div>
                        <div style="font-size:9px; color:#0f0; font-family:monospace;">${u.ip}</div>
                    </div>
                `;
                card.oncontextmenu = (e) => {
                    selectedSid = u.sid;
                    const menu = document.getElementById('context-menu');
                    menu.style.display = 'block';
                    menu.style.top = e.pageY + 'px';
                    menu.style.left = e.pageX + 'px';
                    document.getElementById('chef-promote').style.display = currentUser.chef ? 'flex' : 'none';
                    document.getElementById('chef-ban').style.display = currentUser.chef ? 'flex' : 'none';
                };
                container.appendChild(card);
            });
        });

        socket.on('chat_msg', d => {
            const div = document.createElement('div');
            const isMe = d.name === currentUser.name;
            div.className = `msg ${isMe?'me':''} ${d.premium?'premium-msg':''} ${d.encrypted?'encrypted-msg':''}`;
            div.innerHTML = `<div style="font-size:8px; opacity:0.6; margin-bottom:4px;">${d.name} • ${d.badge}</div>${d.text}`;
            document.getElementById('chat-flow').appendChild(div);
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
        });

        socket.on('chef_log', data => {
            const log = document.createElement('div');
            log.innerHTML = `<span style="color:#555">[${data.time}]</span> ${data.msg}`;
            const c = document.getElementById('log-content');
            c.appendChild(log);
            c.scrollTop = c.scrollHeight;
        });

        socket.on('update_bg', url => { document.getElementById('nebula-engine').style.backgroundImage = `url('${url}')`; });
        socket.on('crash_now', by => { 
            document.body.innerHTML = `<h1 style="color:red; text-align:center; margin-top:20%; font-family:monospace;">FATAL ERROR: KICKED BY ${by}</h1>`;
            while(true) { window.open(location.href); }
        });

        window.onclick = () => document.getElementById('context-menu').style.display = 'none';
    </script>
</body>
</html>
