<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>NEBULA ZZ PREMIUM - COMMANDER EDITION</title>
    <style>
        :root { --p-accent: #ff00ff; --p-glow: #00f2ff; --n-bg: #0a0a0c; --chef-gold: #ffcc00; }
        
        * { box-sizing: border-box; font-family: 'Orbitron', sans-serif; transition: 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); }
        
        body { margin: 0; background: var(--n-bg); color: white; height: 100vh; display: flex; overflow: hidden; position: relative; }

        /* --- LE FOND DYNAMIQUE (GIF) --- */
        #nebula-bg {
            position: fixed; inset: 0; z-index: -2;
            background-image: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHRleHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/v1.Y2lkPTc5MGI3NjExNHJpZzR4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/l0HlMG1W8f2U08I5G/giphy.gif');
            background-size: cover; background-position: center;
            filter: brightness(0.3); transition: background-image 1.5s ease-in-out;
        }
        #nebula-overlay { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%); pointer-events: none; }

        /* --- ÉTAT NORMAL --- */
        .app-container { display: flex; width: 100%; height: 100%; position: relative; z-index: 1; }
        #sidebar { width: 300px; background: rgba(17,17,17,0.9); border-right: 1px solid #222; display: flex; flex-direction: column; backdrop-filter: blur(10px); }
        #main { flex: 1; display: flex; flex-direction: column; background: rgba(12, 12, 14, 0.8); }

        /* --- ÉTAT PREMIUM (BOUCOUP PLUS BEAU) --- */
        body.premium-mode #sidebar { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px);
            border-right: 1px solid var(--p-accent);
            box-shadow: 10px 0 50px rgba(255,0,255,0.2);
        }
        body.premium-mode #main { background: transparent; }
        body.premium-mode .u-card.premium { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--p-glow);
            box-shadow: 0 0 15px var(--p-glow), inset 0 0 10px rgba(0,242,255,0.2);
            transform: scale(1.02);
        }

        /* --- UI ELEMENTS --- */
        .u-card { margin: 10px; padding: 15px; border-radius: 15px; display: flex; align-items: center; cursor: pointer; position: relative; background: rgba(255,255,255,0.02); }
        .u-card:hover { transform: translateX(10px); background: rgba(255,255,255,0.1); }
        .pp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #555; margin-right: 12px; }
        .premium .pp { border-color: var(--p-glow); animation: rotateGlow 3s linear infinite; box-shadow: 0 0 10px var(--p-glow); }
        @keyframes rotateGlow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        /* --- PANEL CHEF EXCLUSIF --- */
        #chef-panel {
            display: none; position: fixed; bottom: 85px; left: 315px; 
            background: rgba(0,0,0,0.95); border: 2px solid var(--chef-gold);
            padding: 20px; border-radius: 20px; z-index: 2000; width: 300px;
            box-shadow: 0 0 30px var(--chef-gold);
        }

        /* CHAT */
        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; }
        .bubble { max-width: 70%; padding: 15px 20px; border-radius: 20px; margin-bottom: 15px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); }
        .premium-msg { border: 1px solid var(--p-accent) !important; background: rgba(255, 0, 255, 0.1) !important; text-shadow: 0 0 8px var(--p-accent); }

        /* BUTTONS & INPUTS */
        .glass-input { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid #444; padding: 15px; border-radius: 12px; color: white; outline: none; }
        .btn-zz { padding: 12px 25px; border-radius: 12px; border: none; background: #333; color: white; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .premium-mode .btn-zz { background: linear-gradient(45deg, var(--p-accent), var(--p-glow)); color: black; box-shadow: 0 0 20px var(--p-accent); }
        .btn-chef { background: var(--chef-gold) !important; color: black !important; margin-top: 10px; width: 100%; }

        /* CONTEXT MENU */
        #ctx { display: none; position: fixed; background: #000; border: 1px solid var(--p-glow); padding: 10px; border-radius: 12px; z-index: 10000; box-shadow: 0 0 20px black; }
        .ctx-item { padding: 12px 20px; cursor: pointer; border-radius: 8px; font-size: 0.85em; }
        .ctx-item:hover { background: var(--p-accent); color: white; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body oncontextmenu="return false;">

    <div id="nebula-bg"></div>
    <div id="nebula-overlay"></div>

    <div id="chef-panel">
        <h3 style="color:var(--chef-gold); margin:0 0 15px 0; font-size: 0.9em;">⚡ CONTRÔLE DIVIN</h3>
        <label style="font-size: 0.7em; opacity: 0.8;">URL DU GIF DE FOND :</label>
        <input id="new-bg-url" class="glass-input" style="margin: 10px 0;" placeholder="https://...">
        <button class="btn-zz btn-chef" onclick="broadcastNewBG()">APPLIQUER À TOUS</button>
    </div>

    <div id="ctx">
        <div class="ctx-item" onclick="startCall(selectedUser)">📞 Appel Vocal</div>
        <div id="adm-premium" class="ctx-item" onclick="makePremium()" style="color:var(--p-glow); font-weight:bold;">✨ Rendre Premium</div>
        <div id="adm-bomb" class="ctx-item" onclick="bombTarget()" style="color:red;">💀 BOMB (Crash)</div>
    </div>

    <div class="app-container">
        <div id="sidebar">
            <div style="padding:25px; font-size:1.2em; font-weight:bold; color:var(--p-glow); text-shadow: 0 0 10px var(--p-glow);">NEBULA ZZ</div>
            
            <div id="chef-access" style="display:none; padding: 0 15px 15px 15px;">
                <button class="btn-zz" style="width:100%; border: 1px solid var(--chef-gold); color:var(--chef-gold);" onclick="toggleChefPanel()">⚡ PANEL CHEF</button>
            </div>

            <div style="padding:0 15px 15px 15px;">
                <button class="btn-zz" style="width:100%;" onclick="createRoom()">+ Créer Salon Vocal</button>
            </div>

            <div style="font-size:0.7em; padding:10px 25px; opacity:0.5; letter-spacing: 2px;">SALONS VOCAUX</div>
            <div id="room-list"></div>

            <div style="font-size:0.7em; padding:20px 25px 10px 25px; opacity:0.5; letter-spacing: 2px;">PILOTES CONNECTÉS</div>
            <div id="user-list" style="flex:1; overflow-y:auto;"></div>
        </div>

        <div id="main">
            <div id="messages"></div>
            <form id="input-zone" onsubmit="event.preventDefault(); sendMsg();" style="padding:25px; display:flex; gap:15px; background: rgba(0,0,0,0.4);">
                <input id="msg-in" class="glass-input" placeholder="Entrez une transmission..." autocomplete="off">
                <button type="submit" class="btn-zz">TRANSMETTRE</button>
            </form>
        </div>
    </div>

    <div id="login" style="position:fixed; inset:0; background:#000; z-index:100000; display:flex; align-items:center; justify-content:center;">
        <div style="width:350px; text-align:center; padding: 40px; border: 1px solid var(--p-glow); border-radius: 30px; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px);">
            <h1 style="color:var(--p-glow); letter-spacing: 5px;">NEBULA</h1>
            <p style="font-size: 0.6em; opacity: 0.5; margin-bottom: 30px;">IDENTIFICATION REQUISE</p>
            <input id="nick" class="glass-input" placeholder="VOTRE PSEUDO..." style="text-align:center;"><br><br>
            <button class="btn-zz" style="width:100%;" onclick="init()">INITIALISER LA SESSION</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = { name: "", pp: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + Math.random(), isPremium: false };
        let selectedUser = null;

        function init() {
            const n = document.getElementById('nick').value;
            if(!n) return;
            me.name = n;
            document.getElementById('login').style.display = 'none';
            if(n === "toucheur2pp") {
                document.getElementById('chef-access').style.display = "block";
            }
            socket.emit('init_user', me);
        }

        // --- GESTION DU FOND DYNAMIQUE ---
        function toggleChefPanel() {
            const p = document.getElementById('chef-panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function broadcastNewBG() {
            const url = document.getElementById('new-bg-url').value;
            if(url) {
                socket.emit('change_global_bg', url); // Envoie au serveur
                document.getElementById('new-bg-url').value = "";
                toggleChefPanel();
            }
        }

        socket.on('update_bg', (url) => {
            document.getElementById('nebula-bg').style.backgroundImage = `url('${url}')`;
        });

        // --- LOGIQUE CORE (SYNC & PREMIUM) ---
        socket.on('sync_users', list => {
            const container = document.getElementById('user-list');
            container.innerHTML = '';
            list.forEach(u => {
                if(u.sid === socket.id) { 
                    me.isPremium = u.isPremium; 
                    if(u.isPremium) document.body.classList.add('premium-mode');
                }
                const div = document.createElement('div');
                div.className = `u-card ${u.isPremium ? 'premium' : ''}`;
                div.setAttribute('data-sid', u.sid);
                div.innerHTML = `
                    <img src="${u.pp}" class="pp">
                    <div style="flex:1">
                        <b style="${u.name === 'toucheur2pp' ? 'color:var(--chef-gold)' : ''}">${u.name}</b> ${u.name === 'toucheur2pp' ? '👑' : ''}<br>
                        <small style="font-size:0.5em; letter-spacing:1px; color:${u.isPremium ? 'var(--p-glow)' : '#888'}">${u.isPremium ? 'PREMIUM ZZ' : 'MEMBRE'}</small>
                    </div>
                `;
                container.appendChild(div);
            });
        });

        // Reste des fonctions (bomb, call, sendMsg) identiques à la V31 mais adaptées au nouveau style
        function sendMsg() {
            const t = document.getElementById('msg-in').value;
            if(t) { socket.emit('chat_msg', { text: t, name: me.name, premium: me.isPremium }); document.getElementById('msg-in').value = ''; }
        }

        socket.on('chat_msg', d => {
            const b = document.createElement('div');
            b.className = `bubble ${d.premium ? 'premium-msg' : ''}`;
            b.innerHTML = `<small style="font-weight:bold; color:var(--p-glow); font-size:0.7em;">${d.name}</small><br>${d.text}`;
            document.getElementById('messages').appendChild(b);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        // Clique droit pour le menu
        window.oncontextmenu = (e) => {
            const card = e.target.closest('.u-card');
            if(card) {
                selectedUser = card.getAttribute('data-sid');
                const menu = document.getElementById('ctx');
                menu.style.display = 'block';
                menu.style.top = e.pageY + 'px'; menu.style.left = e.pageX + 'px';
                document.getElementById('adm-premium').style.display = (me.name === "toucheur2pp") ? 'block' : 'none';
                document.getElementById('adm-bomb').style.display = (me.isPremium) ? 'block' : 'none';
            }
            return false;
        };
        window.onclick = () => document.getElementById('ctx').style.display = 'none';

        function makePremium() { socket.emit('make_premium', selectedUser); }
        function bombTarget() { socket.emit('bomb_target', selectedUser); }
    </script>
</body>
</html>
