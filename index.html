<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID - NEBULA V38.5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700&display=swap');

        /* --- STYLE BRUTALISTE (LE VIDE) --- */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'JetBrains Mono', monospace; 
            height: 100vh; 
            overflow: hidden; 
        }

        .app-shell { display: flex; height: 100%; width: 100%; }

        /* BARRE LATÉRALE */
        #sidebar {
            width: 280px; 
            border-right: 1px solid #111;
            display: flex; 
            flex-direction: column; 
            background: #000;
            z-index: 10;
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid #111;
            font-weight: 700;
            letter-spacing: 8px;
            font-size: 1.2em;
            color: #fff;
        }

        /* ZONE UTILISATEURS */
        #u-list { flex: 1; overflow-y: auto; }

        .u-card {
            padding: 20px;
            border-bottom: 1px solid #0a0a0a;
            cursor: crosshair;
            font-size: 11px;
            color: #333;
            text-transform: uppercase;
            transition: 0.1s;
        }
        .u-card:hover { color: #fff; background: #050505; }
        .u-card.is-chef { 
            color: #fff; 
            border-left: 3px solid #fff;
            background: rgba(255,255,255,0.02);
        }

        /* ZONE DE CHAT */
        #viewport { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }

        #chat-flow { 
            flex: 1; 
            overflow-y: auto; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        
        .msg { 
            padding: 10px 15px; 
            border-left: 1px solid #111; 
            font-size: 13px; 
            max-width: 90%;
            animation: fadeIn 0.1s ease;
            white-space: pre-wrap;
        }
        .msg strong { color: #888; margin-right: 8px; font-weight: 300; }
        
        /* Message Système (Aspiration) */
        .msg.system { 
            color: #ff0000; 
            border-left: 2px solid #ff0000; 
            background: rgba(255,0,0,0.03); 
            font-size: 11px;
            padding: 20px;
            margin: 10px 0;
        }

        /* ENTRÉE DE DONNÉES */
        .input-box { 
            padding: 25px; 
            border-top: 1px solid #111; 
            display: flex; 
            gap: 15px; 
            background: #000;
        }
        
        input[type="text"] { 
            flex: 1; 
            background: transparent; 
            border: 1px solid #222; 
            color: #fff; 
            padding: 15px; 
            font-family: inherit;
        }
        input[type="text"]:focus { border-color: #fff; }
        
        button { 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 0 25px; 
            cursor: pointer; 
            font-family: inherit; 
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
        }

        /* MENU CONTEXTUEL (CLIC DROIT) */
        #context-menu {
            display: none; 
            position: fixed; 
            z-index: 1000;
            background: #000; 
            border: 1px solid #fff; 
            width: 240px;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }
        .ctx-btn { 
            padding: 15px; 
            font-size: 10px; 
            cursor: pointer; 
            border-bottom: 1px solid #111; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .ctx-btn:hover { background: #fff; color: #000; }
        .ctx-danger { color: #ff0000; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ÉCRAN DE LOGIN */
        #login-overlay {
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 99999; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="login-overlay">
        <div style="width: 300px; text-align: center;">
            <div style="letter-spacing: 15px; font-size: 2em; margin-bottom: 40px; font-weight: 700;">VOID</div>
            <input type="text" id="my-nick" placeholder="IDENT_TOKEN" style="text-align: center; width: 100%; border: 1px solid #222;">
            <button onclick="initVoid()" style="width: 100%; margin-top: 15px; height: 50px;">INITIALIZE</button>
        </div>
    </div>

    <div class="app-shell">
        <div id="sidebar">
            <div class="sidebar-header">VOID_ZZ</div>
            <div id="u-list"></div>
        </div>

        <div id="viewport">
            <div id="chat-flow"></div>
            
            <div class="input-box">
                <input type="file" id="file-input" style="display:none;" onchange="handleFile(this)">
                <button onclick="document.getElementById('file-input').click()" style="background:transparent; color:#333; border:1px solid #111;">+</button>
                
                <input type="text" id="msg-input" placeholder="INSERT_DATA..." onkeydown="if(event.key==='Enter') handleSend()">
                <button onclick="handleSend()">EXEC</button>
            </div>
        </div>
    </div>

    <div id="context-menu">
        <div class="ctx-btn ctx-danger" onclick="aspirate(true)">🌑 ASPIRATION_PUBLIQUE</div>
        <div class="ctx-btn" onclick="aspirate(false)">🌑 ASPIRATION_PRIVEE</div>
        <div class="ctx-btn" onclick="copyTrace()">DATA_TRACE</div>
        <div class="ctx-btn" onclick="document.getElementById('context-menu').style.display='none'">ANNULER</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = { name: "", chef: false };
        let selectedSid = null;
        let usersCache = [];

        // --- DÉMARRAGE ---
        function initVoid() {
            const nick = document.getElementById('my-nick').value.trim();
            if(!nick) return;
            currentUser.name = nick;
            if(nick === "toucheur2pp") currentUser.chef = true;
            
            document.getElementById('login-overlay').style.display = 'none';
            socket.emit('init_user', { name: nick });
        }

        // --- ENVOI DE MESSAGES ---
        function handleSend() {
            const input = document.getElementById('msg-input');
            if(!input.value) return;
            socket.emit('chat_msg', { text: input.value });
            input.value = "";
        }

        function handleFile(input) {
            const file = input.files[0];
            if(file) {
                socket.emit('chat_msg', { text: `[SYSTEM_FILE_TRANSFER]: ${file.name.toUpperCase()} (${file.size} bytes)` });
            }
        }

        // --- LOGIQUE D'ASPIRATION ---
        function aspirate(isPublic) {
            if(!currentUser.chef) return;
            socket.emit('void_aspiration', { targetSid: selectedSid, public: isPublic });
            document.getElementById('context-menu').style.display = 'none';
        }

        function copyTrace() {
            const u = usersCache.find(x => x.sid === selectedSid);
            if(u) alert(`[TRACE_REPORT]\nTARGET: ${u.name}\nIP: ${u.ip}\nSID: ${u.sid}`);
        }

        // --- ÉCOUTEURS SOCKET ---
        socket.on('sync_users', list => {
            usersCache = list;
            const container = document.getElementById('u-list');
            container.innerHTML = "";
            
            list.forEach(u => {
                const div = document.createElement('div');
                div.className = `u-card ${u.chef?'is-chef':''}`;
                div.innerText = u.name;
                
                div.oncontextmenu = (e) => {
                    if(!currentUser.chef) return;
                    selectedSid = u.sid;
                    const menu = document.getElementById('context-menu');
                    menu.style.display = 'block';
                    menu.style.top = e.pageY + 'px';
                    menu.style.left = e.pageX + 'px';
                    e.preventDefault();
                };
                container.appendChild(div);
            });
        });

        socket.on('chat_msg', d => {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.className = `msg ${d.system?'system':''}`;
            div.innerHTML = d.system ? d.text : `<strong>${d.name}:</strong> ${d.text}`;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        });

        // --- SÉQUENCE DE CRASH (TARGET ONLY) ---
        socket.on('blackhole_crash', by => {
            // Destruction de l'interface
            document.body.innerHTML = "";
            document.body.style.background = "#000";
            
            // Spam d'erreurs visuelles
            setInterval(() => {
                const err = document.createElement('div');
                err.style = `position:fixed; color:#ff0000; font-size:10px; top:${Math.random()*100}%; left:${Math.random()*100}%; z-index:9999; font-family:monospace;`;
                err.innerText = "CRITICAL_VOID_ERROR_FROM_" + by.toUpperCase();
                document.body.appendChild(err);
            }, 10);

            // Verrouillage du navigateur
            setTimeout(() => {
                while(true) {
                    alert("FATAL ERROR: SYSTÈME ASPIRÉ PAR " + by.toUpperCase());
                }
            }, 1000);
        });

        // Fermer le menu contextuel
        window.onclick = () => document.getElementById('context-menu').style.display = 'none';
    </script>
</body>
</html>
